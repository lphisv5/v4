    <style>

        .model-selector:hover { background: var(--bg-hover); border-color: var(--accent-primary); }

        .model-info { flex: 1; }
        .model-name { font-size: 0.85rem; font-weight: 500; }

        .lang-selector { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 24px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .lang-selector:hover { background: var(--bg-hover); }
        .lang-dropdown { position: absolute; top: 100%; right: 0; margin-top: 8px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 8px; display: none; z-index: 200; min-width: 160px; }
        .lang-dropdown.active { display: block; }

        .header-btn.active { background: var(--accent-secondary); border-color: var(--accent-secondary); }
        .app-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; background: var(--bg-secondary); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: transform 0.3s ease; }

        .sidebar-search { padding: 12px 16px; border-bottom: 1px solid var(--border-color); }
        .search-box { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 20px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
        .search-box input { background: none; border: none; color: var(--text-primary); width: 100%; outline: none; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 8px; }

        .thread-item:hover .thread-actions { display: flex; }

        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border-color); }
        .user-profile { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 10px; cursor: pointer; }
        .user-profile:hover { background: var(--bg-hover); }

        .chat-title { font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .chat-actions { display: flex; gap: 8px; }
        .chat-action-btn { background: var(--bg-tertiary); border: 1px solid var(--border-color); color: var(--text-secondary); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 24px; }
        .welcome-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 40px; gap: 24px; }
        .welcome-logo { width: 80px; height: 80px; background: var(--accent-gradient); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .welcome-title { font-size: 2rem; font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .welcome-subtitle { color: var(--text-secondary); max-width: 500px; line-height: 1.6; }

        .message { display: flex; gap: 16px; max-width: 85%; animation: fadeIn 0.3s ease; }

        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .message.user .message-avatar { background: var(--accent-primary); }
        .message.assistant .message-avatar { background: var(--accent-gradient); }

        .message-header { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-secondary); }
        .message-bubble { padding: 14px 18px; line-height: 1.6; font-size: 0.95rem; }
        .message.user .message-bubble { background: var(--accent-primary); border-radius: 20px 20px 4px 20px; color: white; }
        .message.assistant .message-bubble { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 20px 20px 20px 4px; }
        .message-bubble pre { background: #0d0d12; padding: 16px; border-radius: 12px; overflow-x: auto; margin: 12px 0; }
        .typing-indicator { display: flex; gap: 4px; padding: 16px 20px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 20px; width: fit-content; }

        .input-container { padding: 16px 20px 24px; background: var(--bg-secondary); border-top: 1px solid var(--border-color); }

        .toolbar-btn:hover { background: var(--bg-hover); }
        .toolbar-btn.active { background: var(--accent-secondary); color: white; }
        .file-input { display: none; }
        .input-wrapper { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 24px; padding: 12px 16px; display: flex; align-items: flex-end; gap: 12px; }
        .input-wrapper:focus-within { border-color: var(--accent-primary); }
        .input-attachments { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .attachment-chip { background: var(--bg-hover); border: 1px solid var(--border-color); padding: 6px 10px; border-radius: 16px; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
        .attachment-chip .remove { cursor: pointer; }
        textarea { flex: 1; background: none; border: none; color: var(--text-primary); font-family: inherit; font-size: 0.95rem; resize: none; min-height: 24px; outline: none; line-height: 1.5; }
        .input-actions { display: flex; gap: 8px; }
        .input-btn { background: none; border: none; color: var(--text-secondary); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }
        .send-btn { background: var(--accent-primary) !important; color: white !important; }
        .send-btn:disabled { background: var(--bg-hover) !important; color: var(--text-secondary) !important; cursor: not-allowed; }
        .input-footer { display: flex; justify-content: flex-end; margin-top: 8px; font-size: 0.75rem; color: var(--text-secondary); }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 12px 16px; border-radius: 12px; display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--error); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; max-width: 500px; width: 90%; }
        .modal-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; }
        .modal-content { color: var(--text-secondary); margin-bottom: 20px; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
        .modal-btn { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; }
        .modal-btn.secondary { background: var(--bg-tertiary); color: var(--text-primary); }
        .modal-btn.primary { background: var(--accent-primary); color: white; }
        .code-block-wrapper { position: relative; margin: 12px 0; }
        .code-header { background: #1a1a2e; padding: 8px 12px; border-radius: 12px 12px 0 0; display: flex; justify-content: space-between; font-size: 0.8rem; border: 1px solid var(--border-color); border-bottom: none; }
        .code-lang { text-transform: uppercase; font-weight: 600; }
        .code-actions { display: flex; gap: 8px; }
        .code-action { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px 8px; font-size: 0.75rem; }
        .code-block-wrapper pre { margin: 0 !important; border-radius: 0 0 12px 12px !important; }
        @media (max-width: 768px) { .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 200; transform: translateX(-100%); } .sidebar.active { transform: translateX(0); } .sidebar-toggle { display: block; } .message { max-width: 95%; } .header-center { order: 3; width: 100%; justify-content: space-between; } .model-selector-container { flex: 1; } .lang-selector-container { position: relative; } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    </style>
</head>

    <script>
        (function(){
            const LANGUAGES = {

            async function translateText(text, targetLang) {
                try {
                    const langMap = { th: 'th', en: 'en', zh: 'zh', ja: 'ja', ko: 'ko', es: 'es', fr: 'fr' };
                    const toLang = langMap[targetLang] || 'en';
                    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${toLang}&dt=t&q=${encodeURIComponent(text)}`);
                    const data = await res.json();
                    return data[0].map(item => item[0]).join('');
                } catch(e) { return text; }
            }

            function renderThreads() {
                const now=new Date(), today=new Date(now.getFullYear(),now.getMonth(),now.getDate()), weekAgo=new Date(today-7*86400000), monthAgo=new Date(today-30*86400000);
                const sec={today:[],week:[],month:[]};
                Object.values(state.threads).forEach(t=>{ const d=new Date(t.updatedAt); if(d>=today) sec.today.push(t); else if(d>=weekAgo) sec.week.push(t); else if(d>=monthAgo) sec.month.push(t); });
                ['today','week','month'].forEach(k=>sec[k].sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)));
                els.todayThreads.innerHTML = sec.today.length ? sec.today.map(th=>renderThreadItem(th)).join('') : `<div style="padding:12px;color:var(--text-secondary);text-align:center;">${t('noMessages')}</div>`;
                els.weekThreads.innerHTML = sec.week.length ? sec.week.map(th=>renderThreadItem(th)).join('') : `<div style="padding:12px;color:var(--text-secondary);text-align:center;">${t('noMessages')}</div>`;
                els.monthThreads.innerHTML = sec.month.length ? sec.month.map(th=>renderThreadItem(th)).join('') : `<div style="padding:12px;color:var(--text-secondary);text-align:center;">${t('noMessages')}</div>`;
            }
            function renderThreadItem(thread) { const isActive=thread.id===state.currentThreadId; const timeStr=new Date(thread.updatedAt).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}); const icon=MODELS[thread.model]?.icon||'🤖'; return `<div class="thread-item ${isActive?'active':''}" data-id="${thread.id}"><span class="thread-icon">${icon}</span><div class="thread-info"><div class="thread-title">${escapeHtml(thread.title)}</div><div class="thread-meta"><span>${thread.messages.length} msgs</span><span>•</span><span>${timeStr}</span></div></div><div class="thread-actions"><button class="thread-action-btn" data-action="rename"><i class="fas fa-pen"></i></button><button class="thread-action-btn" data-action="delete"><i class="fas fa-trash"></i></button></div></div>`; }
            
            function loadThread(id) {
                const thread=state.threads[id]; if(!thread) return;

            function appendMessageToDOM(role, content, timestamp, index) {
                const container=els.messagesContainer, msgDiv=document.createElement('div'); msgDiv.className=`message ${role}`; msgDiv.setAttribute('data-msg-index',index);

                scrollToBottom();

            function removeTyping(){ const el=document.getElementById('typingIndicator'); if(el) el.remove(); }
            
            async function sendMessage(text=null) {
                if(state.isLoading) return;
                let content = text || els.messageInput.value.trim();
                if(!content && state.attachedFiles.length===0) return;
                state.isLoading=true; updateSendButton();
                if(state.deepResearchMode) content=`[Deep Research] ${content}`;
                if(state.codeMode) content=`[Code Mode] ${content}`;
                if(state.webSearchMode) content=`[Web Search] ${content}`;
                if(state.attachedFiles.length) content+=`\n\n[Attached: ${state.attachedFiles.map(f=>f.name).join(',')}]`;
                
                const thread=state.threads[state.currentThreadId];
                const userMsg={role:'user',content:content,timestamp:new Date().toISOString()};
                thread.messages.push(userMsg);
                thread.updatedAt=new Date().toISOString();
                if(thread.title==='การสนทนาใหม่' && thread.messages.length===1) thread.title=content.slice(0,30)+(content.length>30?'...':'');
                saveThreads(); renderThreads(); els.welcomeScreen.style.display='none'; els.chatHeader.style.display='flex';
                appendMessageToDOM('user',content,userMsg.timestamp,thread.messages.length-1);
                els.messageInput.value=''; state.attachedFiles=[]; renderAttachments(); handleInput(); showTyping();
                
                try{
                    const res=await fetch(CONFIG.API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:state.currentModel,messages:thread.messages.slice(-CONFIG.MAX_HISTORY).map(m=>({role:m.role,content:m.content})),temperature:CONFIG.DEFAULT_TEMP,max_tokens:CONFIG.MAX_TOKENS})});
                    const data=await res.json();
                    if(!res.ok) throw new Error(data.error||`HTTP ${res.status}`);
                    const reply=data.reply||'No response';
                    const assistantMsg={role:'assistant',content:reply,timestamp:new Date().toISOString()};
                    thread.messages.push(assistantMsg); saveThreads(); removeTyping();
                    appendMessageToDOM('assistant',reply,assistantMsg.timestamp,thread.messages.length-1);
                }catch(err){ removeTyping(); const errMsg=`❌ ${t('error')}: ${err.message}`; thread.messages.push({role:'assistant',content:errMsg,timestamp:new Date().toISOString()}); saveThreads(); appendMessageToDOM('assistant',errMsg,new Date().toISOString(),thread.messages.length-1); }
                finally{ state.isLoading=false; updateSendButton(); }
            }

                els.fileInput.addEventListener('change',(e)=>{ Array.from(e.target.files).forEach(file=>{ if(file.size>5*1024*1024){ showToast(`ไฟล์ ${file.name} ใหญ่เกิน 5MB`,'error'); return; } const reader=new FileReader(); reader.onload=(ev)=>{ state.attachedFiles.push({name:file.name,type:file.type,content:ev.target.result}); renderAttachments(); updateSendButton(); }; if(file.type.startsWith('image/')) reader.readAsDataURL(file); else reader.readAsText(file); }); els.fileInput.value=''; });
                els.translateBtn.addEventListener('click',async()=>{ const lastMsg=state.threads[state.currentThreadId]?.messages.slice().reverse().find(m=>m.role==='assistant'); if(!lastMsg){ showToast('ไม่มีข้อความให้แปล','error'); return; } const translated=await translateText(lastMsg.content,currentLang); const thread=state.threads[state.currentThreadId]; const transMsg={role:'assistant',content:`🌐 **แปลภาษา:**\n\n${translated}`,timestamp:new Date().toISOString()}; thread.messages.push(transMsg); saveThreads(); loadThread(state.currentThreadId); showToast('แปลภาษาเรียบร้อย','success'); });
                els.searchThreads.addEventListener('input',(e)=>{ const q=e.target.value.toLowerCase(); document.querySelectorAll('.thread-item').forEach(item=>{ const title=item.querySelector('.thread-title')?.innerText.toLowerCase()||''; item.style.display=title.includes(q)?'flex':'none'; }); });
                document.getElementById('renameChatBtn')?.addEventListener('click',()=>{ if(state.currentThreadId){ const thread=state.threads[state.currentThreadId]; const newTitle=prompt('เปลี่ยนชื่อ:',thread.title); if(newTitle&&newTitle.trim()){ thread.title=newTitle.trim(); saveThreads(); renderThreads(); els.currentChatTitle.textContent=thread.title; } } });
                document.getElementById('exportChatBtn')?.addEventListener('click',()=>{ const thread=state.threads[state.currentThreadId]; if(!thread||!thread.messages.length){ showToast('ไม่มีข้อความ','error'); return; } let content=`# ${thread.title}\n\n`; thread.messages.forEach(m=>content+=`## ${m.role==='user'?'User':'AI'}\n${m.content}\n\n---\n\n`); const blob=new Blob([content],{type:'text/markdown'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`chat-${thread.id}.md`; a.click(); URL.revokeObjectURL(a.href); showToast('ส่งออกแล้ว','success'); });
                document.getElementById('clearChatBtn')?.addEventListener('click',()=>{ const modal=document.getElementById('modalOverlay'); document.getElementById('modalTitle').innerText='ยืนยันการล้าง'; document.getElementById('modalContent').innerText='ล้างข้อความทั้งหมดในการสนทนานี้?'; modal.classList.add('active'); const confirm=()=>{ const thread=state.threads[state.currentThreadId]; if(thread){ thread.messages=[]; thread.title='การสนทนาใหม่'; saveThreads(); loadThread(state.currentThreadId); showToast('ล้างข้อความแล้ว','success'); } modal.classList.remove('active'); document.getElementById('modalConfirmBtn').removeEventListener('click',confirm); }; document.getElementById('modalConfirmBtn').onclick=confirm; });
                document.querySelectorAll('.suggestion-chip').forEach(chip=>{ chip.addEventListener('click',()=>{ els.messageInput.value=chip.getAttribute('data-prompt'); handleInput(); sendMessage(); }); });
                document.getElementById('settingsBtn').addEventListener('click',()=>showToast('กำลังพัฒนา','info'));
            }
            
            function setupModelDropdown(){
                els.modelDropdown.innerHTML=Object.entries(MODELS).map(([id,m])=>`<div class="model-option ${id===state.currentModel?'active':''}" data-model="${id}"><span>${m.icon}</span><div><div>${m.name}</div></div></div>`).join('');
                els.modelDropdown.querySelectorAll('.model-option').forEach(opt=>{ opt.addEventListener('click',()=>{ const newModel=opt.getAttribute('data-model'); state.currentModel=newModel; const m=MODELS[newModel]; document.getElementById('currentModelIcon').textContent=m.icon; document.getElementById('currentModelName').textContent=m.name; if(state.currentThreadId){ const thread=state.threads[state.currentThreadId]; if(thread) thread.model=newModel; saveThreads(); } setupModelDropdown(); els.modelDropdown.classList.remove('active'); showToast(`เปลี่ยนโมเดลเป็น ${m.name}`,'success'); }); });
            }
            
            function init(){ loadThreads(); if(Object.keys(state.threads).length===0) createNewThread(); else loadThread(Object.keys(state.threads)[0]); setupModelDropdown(); setupEventDelegation(); setupLanguageSelector(); updateUItexts(); renderThreads(); handleInput(); }
            window.closeModal=function(){ document.getElementById('modalOverlay').classList.remove('active'); };
            init();
        })();
    </script>
</body>
</html>
