<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>YANZ AI Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-sidebar: #0a0a0f;
            --bg-main: #0f0f14;
            --bg-surface: #1a1a22;
            --bg-input: #1e1e2a;
            --bg-hover: rgba(255,255,255,0.08);
            --border: #2a2a35;
            --text: #eef2ff;
            --text-secondary: #8b8b9b;
            --accent: #3b82f6;
            --deep-think: #8b5cf6;
            --verified: #10b981;
            --hallucination: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --glow: 0 0 8px rgba(59,130,246,0.5);
        }
        body.light {
            --bg-sidebar: #f3f4f6;
            --bg-main: #ffffff;
            --bg-surface: #e5e7eb;
            --bg-input: #f9fafb;
            --bg-hover: rgba(0,0,0,0.05);
            --border: #d1d5db;
            --text: #111827;
            --text-secondary: #6b7280;
            --accent: #2563eb;
            --deep-think: #7c3aed;
            --verified: #059669;
            --hallucination: #dc2626;
            --warning: #d97706;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
            --glow: 0 0 8px rgba(37,99,235,0.5);
        }
        body { background: var(--bg-main); color: var(--text); font-family: 'Inter', system-ui, -apple-system, sans-serif; height: 100vh; overflow: hidden; display: flex; }
        .sidebar { width: 280px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 10; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
        .new-chat-btn { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 28px; padding: 10px 16px; width: 100%; display: flex; align-items: center; justify-content: space-between; color: var(--text); font-weight: 500; cursor: pointer; transition: 0.2s; }
        .new-chat-btn:hover { background: var(--accent); color: white; transform: scale(0.98); }
        .shortcut-hint { font-size: 0.7rem; color: var(--text-secondary); display: none; }
        .new-chat-btn:hover .shortcut-hint { display: inline; color: rgba(255,255,255,0.8); }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 8px 12px; }
        .thread-item { padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: background 0.2s; margin-bottom: 2px; display: flex; align-items: center; justify-content: space-between; }
        .thread-item.active { background: var(--bg-surface); box-shadow: inset 0 0 0 1px var(--accent); }
        .thread-item:hover { background: var(--bg-surface); }
        .thread-title { font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .thread-meta { font-size: 0.7rem; color: var(--text-secondary); margin-left: 8px; flex-shrink: 0; }
        .thread-menu { position: relative; opacity: 0; transition: opacity 0.2s; flex-shrink: 0; }
        .thread-item:hover .thread-menu { opacity: 1; }
        .menu-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px; border-radius: 6px; }
        .menu-btn:hover { background: var(--bg-hover); color: var(--text); }
        .menu-dropdown { position: absolute; right: 0; top: 100%; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; padding: 8px 0; min-width: 140px; display: none; box-shadow: var(--shadow); z-index: 100; }
        .menu-dropdown.active { display: block; }
        .menu-item { padding: 8px 16px; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; cursor: pointer; }
        .menu-item:hover { background: var(--bg-hover); }
        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .user-info { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px; border-radius: 40px; }
        .user-info:hover { background: var(--bg-surface); }
        .user-avatar { width: 32px; height: 32px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .main { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); min-width: 0; }
        .chat-header { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg-main); }
        .chat-title { font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .chat-actions { display: flex; gap: 8px; }
        .chat-action-btn { background: none; border: none; color: var(--text-secondary); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; }
        .chat-action-btn:hover { background: var(--bg-surface); color: var(--text); }
        .chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; }
        .welcome { text-align: center; margin: auto; max-width: 500px; padding: 40px; }
        .welcome h2 { font-size: 2rem; font-weight: 600; margin-bottom: 16px; background: linear-gradient(135deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .message { display: flex; gap: 16px; max-width: 80%; animation: fadeIn 0.2s ease; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-surface); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; }
        .message.user .message-avatar { background: var(--accent); }
        .message-bubble { padding: 12px 16px; border-radius: 20px; background: var(--bg-surface); line-height: 1.6; font-size: 0.9rem; word-break: break-word; }
        .message.user .message-bubble { background: var(--accent); border-radius: 20px 20px 4px 20px; }

        .message-bubble pre {
            background: #0d0d12;
            padding: 12px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 8px 0;
            position: relative;
        }
        .message-bubble pre code {
            padding-top: 28px !important;
            display: block;
        }
        .copy-code-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 10;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #ccc;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.72rem;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .copy-code-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .copy-code-btn.copied { background: rgba(16,185,129,0.3); color: #6ee7b7; border-color: #10b981; }
        .verification-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(16,185,129,0.15); padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; margin-top: 8px; color: var(--verified); }
        .feedback-buttons { display: flex; gap: 8px; margin-top: 8px; }
        .feedback-btn { background: none; border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; color: var(--text-secondary); }
        .feedback-btn:hover { background: var(--bg-surface); color: var(--text); }
        .message-actions { display: flex; gap: 6px; margin-top: 6px; opacity: 0; transition: opacity 0.2s; }
        .message:hover .message-actions { opacity: 1; }
        .action-btn { background: none; border: none; color: var(--text-secondary); font-size: 0.7rem; cursor: pointer; padding: 4px 8px; border-radius: 16px; background: var(--bg-surface); }
        .action-btn:hover { background: var(--bg-hover); color: var(--text); }
        .input-area { padding: 16px 24px 24px; border-top: 1px solid var(--border); background: var(--bg-main); }
        .input-tools { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .tool-btn { background: none; border: 1px solid var(--border); padding: 6px 14px; border-radius: 28px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; color: var(--text-secondary); cursor: pointer; transition: 0.2s; }
        .tool-btn:hover { border-color: var(--accent); color: var(--text); }
        .tool-btn.active { background: var(--deep-think); border-color: var(--deep-think); color: white; box-shadow: var(--glow); }
        .tool-btn#imageGenBtn.active { background: #ec4899; border-color: #ec4899; }
        .input-wrapper { display: flex; gap: 12px; background: var(--bg-input); border-radius: 32px; padding: 8px 16px; border: 1px solid var(--border); }
        .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        textarea { flex: 1; background: transparent; border: none; color: var(--text); font-family: inherit; font-size: 0.9rem; resize: none; outline: none; min-height: 24px; max-height: 150px; }
        .send-btn { background: var(--accent); border: none; width: 36px; height: 36px; border-radius: 50%; color: white; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.1s; }
        .send-btn:hover:not(:disabled) { background: #2563eb; transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .image-gen-loading { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 20px; }
        .image-gen-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: #ec4899; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .generated-image { max-width: 100%; max-height: 400px; border-radius: 12px; border: 1px solid var(--border); display: block; margin: 8px 0; cursor: zoom-in; transition: transform 0.2s; }
        .generated-image:hover { transform: scale(1.01); }
        .image-download-btn { display: inline-flex; align-items: center; gap: 6px; background: rgba(236,72,153,0.15); border: 1px solid #ec4899; color: #f9a8d4; border-radius: 20px; padding: 5px 14px; font-size: 0.78rem; cursor: pointer; margin-top: 6px; text-decoration: none; }
        .image-download-btn:hover { background: rgba(236,72,153,0.3); }
        .typing-indicator { display: flex; gap: 4px; padding: 12px; background: var(--bg-surface); border-radius: 20px; width: fit-content; }
        .toast-container { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1200; pointer-events: none; }
        .toast { min-width: 220px; max-width: 320px; padding: 12px 16px; border-radius: 16px; color: white; font-size: 0.9rem; line-height: 1.4; box-shadow: 0 12px 30px rgba(0,0,0,0.25); opacity: 0; transform: translateY(10px); transition: transform 0.2s ease, opacity 0.2s ease; pointer-events: auto; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.info { background: rgba(51,65,85,0.97); }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .confirm-modal-overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.65); z-index: 1300; }
        .confirm-modal-overlay.active { display: flex; }
        .confirm-modal { width: min(95vw, 380px); background: var(--bg-main); border: 1px solid var(--border); border-radius: 20px; padding: 24px; box-shadow: var(--shadow); }
        .confirm-message { margin-bottom: 18px; color: var(--text); font-size: 0.95rem; line-height: 1.6; }
        .confirm-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .confirm-btn { border: none; border-radius: 12px; padding: 10px 16px; cursor: pointer; font-weight: 600; }
        .confirm-no { background: var(--bg-surface); color: var(--text-secondary); }
        .confirm-yes { background: var(--accent); color: white; }
        .thread-rename-input { width: 100%; background: transparent; color: inherit; font: inherit; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 8px 10px; }
        .message-bubble textarea.inline-edit-textarea { width: 100%; min-height: 100px; border: 1px solid rgba(255,255,255,0.2); background: rgba(15,23,42,0.95); color: inherit; border-radius: 12px; padding: 10px; font: inherit; resize: vertical; }
        .dot { width: 6px; height: 6px; background: var(--text-secondary); border-radius: 50%; animation: bounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .attachment-previews { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
        .attachment-preview { display: inline-flex; align-items: center; gap: 8px; background: var(--bg-surface); border-radius: 20px; padding: 6px 12px; }
        .attachment-preview img { width: 28px; height: 28px; object-fit: cover; border-radius: 6px; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.2s; backdrop-filter: blur(4px); }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .settings-modal { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 32px; width: 90%; max-width: 550px; max-height: 85vh; overflow-y: auto; padding: 28px; }
        .settings-header { display: flex; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
        .settings-header h3 { font-size: 1.4rem; font-weight: 600; }
        .close-settings { background: none; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; padding: 8px; border-radius: 50%; }
        .close-settings:hover { background: var(--bg-hover); color: var(--text); }
        .setting-group { margin-bottom: 28px; }
        .setting-label { font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .setting-desc { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 12px; }
        .toggle-switch { display: flex; align-items: center; gap: 12px; }
        .toggle { position: relative; width: 44px; height: 24px; background: var(--border); border-radius: 30px; cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .toggle.active { background: var(--accent); }
        .toggle::after { content: ''; position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.2s; }
        .toggle.active::after { left: 22px; }
        .select-input { background: var(--bg-input); border: 1px solid var(--border); border-radius: 28px; padding: 10px 16px; width: 100%; color: var(--text); outline: none; }
        .action-buttons { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
        .action-btn-settings { background: none; border: 1px solid var(--border); padding: 8px 16px; border-radius: 28px; cursor: pointer; color: var(--text); }
        .action-btn-settings.danger { border-color: #ef4444; color: #ef4444; }
        .action-btn-settings.danger:hover { background: #ef4444; color: white; }
        .action-btn-settings:hover { background: var(--bg-hover); }
        hr { border-color: var(--border); margin: 20px 0; }
        .sidebar-toggle-btn { display: none; position: fixed; top: 16px; left: 16px; z-index: 20; background: var(--bg-surface); border: none; border-radius: 50%; width: 40px; height: 40px; color: var(--text); cursor: pointer; font-size: 1.2rem; box-shadow: var(--shadow); }

        .image-options { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .size-option { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 0.75rem; cursor: pointer; color: var(--text-secondary); transition: 0.15s; }
        .size-option.active { border-color: #ec4899; color: #f9a8d4; background: rgba(236,72,153,0.1); }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-toggle-btn { display: flex; align-items: center; justify-content: center; }
            .message { max-width: 95%; }
        }

        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; cursor: zoom-out; }
        .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 12px; object-fit: contain; }
    </style>
</head>
<body>
<button class="sidebar-toggle-btn" id="sidebarToggleBtn"><i class="fas fa-bars"></i></button>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="new-chat-btn" id="newChatBtn"><span><i class="fas fa-plus"></i> New chat</span><span class="shortcut-hint">Ctrl+J</span></div>
    </div>
    <div class="sidebar-content"><div class="thread-list" id="threadList"></div></div>
    <div class="sidebar-footer">
        <div class="user-info" id="settingsBtn">
            <div class="user-avatar"><i class="fas fa-cog"></i></div>
            <span>Settings</span>
        </div>
    </div>
</div>
<div class="main">
    <div class="chat-header" id="chatHeader" style="display: none;">
        <div class="chat-title"><i class="fas fa-message"></i> <span id="currentChatTitle"></span></div>
        <div class="chat-actions">
            <button class="chat-action-btn" id="renameChatBtn" title="Rename"><i class="fas fa-pen"></i></button>
            <button class="chat-action-btn" id="exportChatBtn" title="Export"><i class="fas fa-download"></i></button>
            <button class="chat-action-btn" id="clearChatBtn" title="Clear"><i class="fas fa-trash-alt"></i></button>
            <button class="chat-action-btn" id="closeChatBtn" title="Close"><i class="fas fa-times"></i></button>
        </div>
    </div>
    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcomeScreen"><h2>How can I help you?</h2></div>
    </div>
    <div class="input-area">
        <div class="input-tools">
            <button class="tool-btn" id="deepThinkBtn"><i class="fas fa-brain"></i> DeepThink</button>
            <button class="tool-btn" id="webSearchBtn"><i class="fas fa-globe"></i> Search</button>
            <button class="tool-btn" id="codeReviewBtn"><i class="fas fa-code-branch"></i> Code Review</button>
            <button class="tool-btn" id="imageGenBtn"><i class="fas fa-image"></i> Image</button>
            <label class="tool-btn" for="fileInput" style="cursor:pointer;"><i class="fas fa-paperclip"></i> Attach</label>
            <input type="file" id="fileInput" style="display: none;" multiple accept="image/*,.txt,.pdf,.js,.py,.html,.css,.json,.md">
        </div>
        <div id="imageOptions" style="display:none;">
            <div style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:6px;"><i class="fas fa-image" style="color:#ec4899;"></i> Image size:</div>
            <div class="image-options">
                <div class="size-option active" data-size="512x512">512×512</div>
                <div class="size-option" data-size="768x768">768×768</div>
                <div class="size-option" data-size="1024x1024">1024×1024</div>
                <div class="size-option" data-size="1280x720">1280×720 (16:9)</div>
            </div>
        </div>
        <div id="attachmentPreviews" class="attachment-previews"></div>
        <div class="input-wrapper">
            <textarea id="messageInput" rows="1" placeholder="Message YANZ AI..."></textarea>
            <button class="send-btn" id="sendBtn" disabled><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settingsModal">
    <div class="settings-modal">
        <div class="settings-header">
            <h3><i class="fas fa-sliders-h"></i> Settings</h3>
            <button class="close-settings" id="closeSettings"><i class="fas fa-times"></i></button>
        </div>
        <div class="setting-group">
            <div class="setting-label"><i class="fas fa-microchip"></i> Model selection</div>
            <div class="toggle-switch"><div class="toggle" id="autoModelToggle"></div><span>Auto Model</span></div>
            <div id="manualModelContainer" style="margin-top:12px;display:none;">
                <select id="manualModelSelect" class="select-input">
                    <option value="llama-4-maverick">General & Reasoning</option>
                    <option value="llama-4-scout">Fast, Efficient</option>
                    <option value="llama-3.2-11b-vision">Image understanding</option>
                    <option value="llama-3.2-90b-vision">High-res vision</option>
                    <option value="llama-3.3-70b">General purpose</option>
                    <option value="llama-3.1-405b">Extreme reasoning</option>
                    <option value="deepseek-r1">Deep reasoning</option>
                    <option value="deepseek-chat">Code expert</option>
                    <option value="qwen-2.5-72b">Multilingual</option>
                    <option value="gpt-4o-mini">Fast</option>
                    <option value="claude-3-haiku">Balanced</option>
                </select>
            </div>
        </div>
        <div class="setting-group">
            <div class="setting-label"><i class="fas fa-palette"></i> Image Generation Engine</div>
            <div class="setting-desc">Free image generation via Pollinations AI (no API key needed)</div>
            <select id="imageEngineSelect" class="select-input">
                <option value="flux">Flux (recommended, photorealistic)</option>
                <option value="turbo">Turbo (fast)</option>
                <option value="flux-realism">Flux Realism</option>
                <option value="flux-anime">Flux Anime</option>
                <option value="flux-3d">Flux 3D</option>
                <option value="dall-e-3">DALL·E 3 (if backend supports)</option>
            </select>
        </div>
        <div class="setting-group">
            <div class="setting-label"><i class="fas fa-thermometer-half"></i> Temperature</div>
            <input type="range" id="tempSlider" min="0" max="1.5" step="0.05" value="0.5">
            <div style="display:flex;justify-content:space-between;font-size:0.8rem;color:var(--text-secondary);margin-top:4px;"><span>Precise</span><span id="tempValue">0.5</span><span>Creative</span></div>
        </div>
        <div class="setting-group">
            <div class="setting-label"><i class="fas fa-info-circle"></i> Show model info</div>
            <div class="toggle-switch"><div class="toggle" id="hallucinationGuardToggle"></div><span>Show model info badge</span></div>
        </div>
        <div class="setting-group">
            <div class="setting-label"><i class="fas fa-palette"></i> Theme</div>
            <select id="themeSelect" class="select-input">
                <option value="system">System</option>
                <option value="dark">Dark</option>
                <option value="light">Light</option>
            </select>
        </div>
        <div class="setting-group">
            <div class="action-buttons">
                <button class="action-btn-settings" id="exportDataBtn"><i class="fas fa-download"></i> Export data</button>
                <button class="action-btn-settings danger" id="deleteAllChatsBtn"><i class="fas fa-trash-alt"></i> Delete all chats</button>
            </div>
        </div>
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>
<div id="confirmModal" class="confirm-modal-overlay" aria-hidden="true">
    <div class="confirm-modal">
        <div class="confirm-message" id="confirmMessage"></div>
        <div class="confirm-actions">
            <button type="button" class="confirm-btn confirm-no">Cancel</button>
            <button type="button" class="confirm-btn confirm-yes">Confirm</button>
        </div>
    </div>
</div>

<script>
const API_BASE_URL = (window.location.protocol === 'file:' || window.location.origin === 'null')
    ? 'https://yanz-ai-free.vercel.app'
    : window.location.origin;
const API_URL = `${API_BASE_URL}/api/chat`;
const IMAGE_API_URL = `${API_BASE_URL}/api/image`;
const VISION_MODEL = 'llama-3.2-11b-vision';

function buildPollinationsUrl(prompt, model, width, height) {
    const encoded = encodeURIComponent(prompt);
    return `https://image.pollinations.ai/prompt/${encoded}?model=${model}&width=${width}&height=${height}&nologo=true&seed=${Math.floor(Math.random()*99999)}`;
}

let currentThreadId = null;
let threads = {};
let deepThinkMode = false;
let webSearchMode = false;
let codeReviewMode = false;
let imageGenMode = false;
let attachedFiles = [];
let autoModelEnabled = true;
let manualModel = 'llama-3.3-70b';
let temperature = 0.5;
let hallucinationGuard = true;
let isStreaming = false;
let currentAbortController = null;
let selectedImageSize = '512x512';
let imageEngine = 'flux';

let renderScheduled = false;

function escapeHtml(str) {
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function scrollToBottom() {
    const c = document.getElementById('chatContainer');
    c.scrollTop = c.scrollHeight;
}
function isUserAtBottom() {
    const c = document.getElementById('chatContainer');
    return c.scrollTop + c.clientHeight >= c.scrollHeight - 120;
}

function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    if (!container) return;
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    requestAnimationFrame(() => { requestAnimationFrame(() => toast.classList.add('show')); });
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
    }, 3500);
}

function confirmAction(message) {
    return new Promise(resolve => {
        const modal = document.getElementById('confirmModal');
        document.getElementById('confirmMessage').textContent = message;
        modal.classList.add('active');
        modal.setAttribute('aria-hidden', 'false');
        const yes = modal.querySelector('.confirm-yes');
        const no = modal.querySelector('.confirm-no');
        const cleanup = result => {
            modal.classList.remove('active');
            modal.setAttribute('aria-hidden', 'true');
            yes.removeEventListener('click', onYes);
            no.removeEventListener('click', onNo);
            modal.removeEventListener('click', onOverlay);
            resolve(result);
        };
        const onYes = () => cleanup(true);
        const onNo = () => cleanup(false);
        const onOverlay = e => { if (e.target === modal) cleanup(false); };
        yes.addEventListener('click', onYes);
        no.addEventListener('click', onNo);
        modal.addEventListener('click', onOverlay);
    });
}

function applyTheme(theme) {
    if (theme === 'dark') document.body.classList.remove('light');
    else if (theme === 'light') document.body.classList.add('light');
    else {
        window.matchMedia('(prefers-color-scheme: dark)').matches
            ? document.body.classList.remove('light')
            : document.body.classList.add('light');
    }
    localStorage.setItem('yaz_theme', theme);
}
function loadTheme() {
    const saved = localStorage.getItem('yaz_theme') || 'system';
    document.getElementById('themeSelect').value = saved;
    applyTheme(saved);
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (localStorage.getItem('yaz_theme') === 'system') applyTheme('system');
});

function loadSettings() {
    try {
        autoModelEnabled = localStorage.getItem('yaz_auto_model') !== 'false';
        manualModel = localStorage.getItem('yaz_manual_model') || 'llama-3.3-70b';
        temperature = parseFloat(localStorage.getItem('yaz_temperature') || '0.5');
        hallucinationGuard = localStorage.getItem('yaz_hallucination_guard') !== 'false';
        imageEngine = localStorage.getItem('yaz_image_engine') || 'flux';
        document.getElementById('autoModelToggle').classList.toggle('active', autoModelEnabled);
        document.getElementById('manualModelContainer').style.display = autoModelEnabled ? 'none' : 'block';
        document.getElementById('manualModelSelect').value = manualModel;
        document.getElementById('tempSlider').value = temperature;
        document.getElementById('tempValue').innerText = temperature;
        document.getElementById('hallucinationGuardToggle').classList.toggle('active', hallucinationGuard);
        document.getElementById('imageEngineSelect').value = imageEngine;
    } catch (err) {
        console.error('Settings load error', err);
    }
}

function safeParseJSON(value, fallback = null) {
    try { return JSON.parse(value); } catch { return fallback; }
}
function loadThreads() {
    try {
        const s = localStorage.getItem('yaz_threads');
        const parsed = s ? safeParseJSON(s, {}) : {};
        threads = (parsed && typeof parsed === 'object') ? parsed : {};
    } catch (err) {
        console.error('Load threads error', err);
        threads = {};
    }
}
function saveThreads() {
    try {
        localStorage.setItem('yaz_threads', JSON.stringify(threads));
    } catch (err) {
        showToast('Unable to save chat locally (storage full?)', 'error');
    }
}

function addCopyButtonsToCodeBlocks(root) {
    if (!root) return;
    root.querySelectorAll('pre').forEach(pre => {
        if (pre.querySelector('.copy-code-btn')) return;
        const codeEl = pre.querySelector('code');
        if (!codeEl) return;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'copy-code-btn';
        btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
        btn.title = 'Copy code';
        btn.addEventListener('click', () => {
            navigator.clipboard.writeText(codeEl.innerText).then(() => {
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => showToast('Unable to copy', 'error'));
        });
        pre.appendChild(btn);
    });
}

function renderBubbleContent(bubble, text, autoScroll = true) {
    if (!bubble) return;
    const wasAtBottom = isUserAtBottom();
    const sanitized = DOMPurify.sanitize(marked.parse(text));
    bubble.innerHTML = sanitized;
    bubble.querySelectorAll('pre code').forEach(block => {
        if (!block.dataset.highlighted) {
            hljs.highlightElement(block);
            block.dataset.highlighted = 'yes';
        }
    });
    addCopyButtonsToCodeBlocks(bubble);
    if (autoScroll && wasAtBottom) scrollToBottom();
}

function scheduleRender(bubble, text, autoScroll) {
    if (renderScheduled) return;
    renderScheduled = true;
    requestAnimationFrame(() => {
        renderScheduled = false;
        renderBubbleContent(bubble, text, autoScroll);
    });
}

function setImageMode(active) {
    imageGenMode = active;
    document.getElementById('imageGenBtn').classList.toggle('active', active);
    document.getElementById('imageOptions').style.display = active ? 'block' : 'none';
    document.getElementById('messageInput').placeholder = active
        ? '✨ Describe the image you want to generate...'
        : 'Message YANZ AI...';
    if (active) {
        webSearchMode = false;
        deepThinkMode = false;
        codeReviewMode = false;
        document.getElementById('webSearchBtn').classList.remove('active');
        document.getElementById('deepThinkBtn').classList.remove('active');
        document.getElementById('codeReviewBtn').classList.remove('active');
    }
}

async function sendImageGeneration() {
    if (isStreaming) return;
    const prompt = document.getElementById('messageInput').value.trim();
    if (!prompt) return;
    if (!currentThreadId || !threads[currentThreadId]) createNewThread();
    isStreaming = true;
    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;

    const thread = threads[currentThreadId];
    const userMsg = { role: 'user', content: `🎨 Generate image: ${prompt}`, timestamp: new Date().toISOString() };
    thread.messages.push(userMsg);
    thread.updatedAt = new Date().toISOString();
    if (thread.title === 'New chat') thread.title = `Image: ${prompt.slice(0, 25)}`;
    saveThreads();
    appendMessageToDOM('user', userMsg.content, userMsg.timestamp, thread.messages.length - 1);
    document.getElementById('messageInput').value = '';
    setImageMode(false);
    updateSendButton();
    renderThreads();

    const assistantDiv = document.createElement('div');
    assistantDiv.className = 'message assistant';
    assistantDiv.innerHTML = `<div class="message-avatar">AI</div><div class="message-content"><div class="message-bubble"><div class="image-gen-loading"><div class="image-gen-spinner"></div><span style="font-size:0.85rem;color:var(--text-secondary);">Generating image...</span></div></div></div>`;
    document.getElementById('chatContainer').appendChild(assistantDiv);
    const welcome = document.querySelector('.welcome');
    if (welcome) welcome.style.display = 'none';
    document.getElementById('chatHeader').style.display = 'flex';
    scrollToBottom();

    const bubble = assistantDiv.querySelector('.message-bubble');

    try {
        const [imgW, imgH] = (selectedImageSize || '512x512').split('x').map(Number);
        let imageUrl;

        let usedPollinations = false;
        try {
            const res = await fetch(IMAGE_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, model: 'dall-e-3', size: selectedImageSize || '1024x1024', n: 1, response_format: 'url' }),
                signal: AbortSignal.timeout(15000)
            });
            if (res.ok) {
                const data = await res.json();
                imageUrl = data?.data?.[0]?.url || data?.data?.[0]?.b64_json
                    ? `data:image/png;base64,${data.data[0].b64_json}` : null;
            }
        } catch { }

        if (!imageUrl) {
            usedPollinations = true;
            imageEngine = document.getElementById('imageEngineSelect').value || 'flux';
            imageUrl = buildPollinationsUrl(prompt, imageEngine, imgW, imgH);
        }

        await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = resolve;
            img.onerror = reject;
            img.src = imageUrl;
            setTimeout(reject, 30000);
        });

        const modelLabel = usedPollinations ? `Pollinations / ${imageEngine}` : 'DALL·E 3';
        const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        bubble.innerHTML = `
            <img src="${imageUrl}" class="generated-image" alt="${escapeHtml(prompt)}" title="Click to enlarge">
            <div style="font-size:0.8rem;color:var(--text-secondary);margin-top:6px;">"${escapeHtml(prompt)}"</div>
            <a href="${imageUrl}" download="yanz-ai-image.png" target="_blank" class="image-download-btn">
                <i class="fas fa-download"></i> Download image
            </a>
        `;

        bubble.querySelector('.generated-image').addEventListener('click', () => {
            const lb = document.createElement('div');
            lb.className = 'lightbox';
            lb.innerHTML = `<img src="${imageUrl}" alt="Generated image">`;
            lb.addEventListener('click', () => lb.remove());
            document.body.appendChild(lb);
        });

        if (hallucinationGuard) {
            const badge = document.createElement('div');
            badge.className = 'verification-badge';
            badge.innerHTML = `<i class="fas fa-image"></i> ${modelLabel} · ${timeStr}`;
            assistantDiv.querySelector('.message-content').appendChild(badge);
        }

        const assistantMsg = {
            role: 'assistant',
            content: `Generated image for: "${prompt}"`,
            timestamp: new Date().toISOString(),
            images: [imageUrl],
            isGeneratedImage: true,
            verification: hallucinationGuard ? { model: modelLabel, time: timeStr } : null
        };
        thread.messages.push(assistantMsg);
        saveThreads();
        scrollToBottom();

    } catch (err) {
        bubble.innerHTML = `<span style="color:var(--hallucination);">❌ Image generation failed: ${escapeHtml(err.message || 'Unknown error')}</span><br><span style="font-size:0.8rem;color:var(--text-secondary);">Try a different prompt or check your connection.</span>`;
        showToast('Image generation failed', 'error');
    } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        updateSendButton();
        attachMessageActions();
    }
}

function appendMessageToDOM(role, content, timestamp, idx, verification = null, images = []) {
    const container = document.getElementById('chatContainer');
    const welcome = document.querySelector('.welcome');
    if (welcome) welcome.style.display = 'none';
    document.getElementById('chatHeader').style.display = 'flex';

    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${role}`;
    msgDiv.dataset.index = idx;

    const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const sanitized = DOMPurify.sanitize(marked.parse(content));

    let badgeHtml = '';
    if (role === 'assistant' && verification?.model) {
        badgeHtml = `<div class="verification-badge"><i class="fas fa-info-circle"></i> ${escapeHtml(verification.model)} · ${escapeHtml(verification.time || time)}</div>`;
    }

    let imgPreviews = '';
    if (images && images.length) {
        imgPreviews = images.map(img =>
            `<img src="${img}" style="max-width:100%;max-height:300px;border-radius:10px;margin:6px 0;display:block;border:1px solid var(--border);cursor:zoom-in;" onclick="openLightbox('${img}')">`
        ).join('');
    }

    const feedbackBtns = role === 'assistant'
        ? `<div class="feedback-buttons"><button class="feedback-btn" data-feedback="correct"><i class="fas fa-thumbs-up"></i> Correct</button><button class="feedback-btn" data-feedback="wrong"><i class="fas fa-thumbs-down"></i> Hallucinated</button></div>`
        : '';

    const editOrRegen = role === 'assistant'
        ? `<button class="action-btn" data-action="regenerate">⟳ Regenerate</button>`
        : `<button class="action-btn" data-action="edit">✏️ Edit</button>`;

    msgDiv.innerHTML = `
        <div class="message-avatar">${role === 'user' ? 'U' : 'AI'}</div>
        <div class="message-content">
            <div class="message-bubble">${imgPreviews}${sanitized}</div>
            ${badgeHtml}${feedbackBtns}
            <div class="message-actions">
                <button class="action-btn" data-action="copy"><i class="fas fa-copy"></i> Copy</button>
                ${editOrRegen}
                <button class="action-btn" data-action="delete">🗑️ Delete</button>
            </div>
        </div>`;
    container.appendChild(msgDiv);

    msgDiv.querySelectorAll('pre code').forEach(block => {
        hljs.highlightElement(block);
        block.dataset.highlighted = 'yes';
    });
    addCopyButtonsToCodeBlocks(msgDiv);

    if (isUserAtBottom()) scrollToBottom();
}

function openLightbox(url) {
    const lb = document.createElement('div');
    lb.className = 'lightbox';
    lb.innerHTML = `<img src="${url}" alt="Image">`;
    lb.addEventListener('click', () => lb.remove());
    document.body.appendChild(lb);
}

function attachMessageActions() {
    document.querySelectorAll('.message .action-btn').forEach(btn => {
        btn.replaceWith(btn.cloneNode(true));
    });
    document.querySelectorAll('.message .action-btn').forEach(btn => {
        btn.addEventListener('click', handleMessageAction);
    });
    document.querySelectorAll('.feedback-btn').forEach(btn => {
        btn.replaceWith(btn.cloneNode(true));
    });
    document.querySelectorAll('.feedback-btn').forEach(btn => {
        btn.addEventListener('click', handleFeedback);
    });
}

function handleMessageAction(e) {
    const btn = e.currentTarget;
    const action = btn.dataset.action;
    const msgDiv = btn.closest('.message');
    if (!msgDiv) return;
    const idx = parseInt(msgDiv.dataset.index);
    const thread = threads[currentThreadId];
    if (!thread || !thread.messages[idx]) return;

    if (action === 'copy') {
        navigator.clipboard.writeText(thread.messages[idx].content)
            .then(() => showToast('Copied!', 'success'))
            .catch(() => showToast('Unable to copy', 'error'));

    } else if (action === 'delete') {
        thread.messages.splice(idx, 1);
        saveThreads();
        loadThread(currentThreadId);

    } else if (action === 'edit') {
        const bubble = msgDiv.querySelector('.message-bubble');
        if (!bubble || bubble.querySelector('textarea')) return;
        const currentText = thread.messages[idx].content;
        const textarea = document.createElement('textarea');
        textarea.className = 'inline-edit-textarea';
        textarea.value = currentText;
        bubble.innerHTML = '';
        bubble.appendChild(textarea);
        textarea.focus(); textarea.select();
        let done = false;
        const commit = () => {
            if (done) return; done = true;
            const newText = textarea.value.trim();
            if (!newText) { showToast('Message cannot be empty', 'error'); done = false; return; }
            thread.messages[idx].content = newText;
            thread.messages = thread.messages.slice(0, idx + 1);
            saveThreads();
            loadThread(currentThreadId);
            sendMessage();
        };
        textarea.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
            if (e.key === 'Escape') { done = true; loadThread(currentThreadId); }
        });
        textarea.addEventListener('blur', () => { if (!done && textarea.value.trim() !== currentText) commit(); });

    } else if (action === 'regenerate') {
        let userIdx = idx - 1;
        while (userIdx >= 0 && thread.messages[userIdx].role !== 'user') userIdx--;
        if (userIdx >= 0) {
            thread.messages = thread.messages.slice(0, userIdx + 1);
            saveThreads();
            loadThread(currentThreadId);
            sendMessage();
        }
    }
}

function handleFeedback(e) {
    const ok = e.currentTarget.dataset.feedback === 'correct';
    showToast(ok ? '✅ Thanks! Feedback saved.' : '🔍 Reported. We\'ll improve.', 'success');
}

function selectAutoModel(prompt, hasImages) {
    if (hasImages) return VISION_MODEL;
    const lower = prompt.toLowerCase();
    if (codeReviewMode || /\b(code|function|debug|javascript|typescript|python|css|html|php|java|c\+\+|sql)\b/.test(lower)) return 'deepseek-chat';
    if (deepThinkMode || /\b(why|explain|analyze|reason|think|philosophy|compare)\b/.test(lower)) return 'llama-4-maverick';
    if (/[\u0E00-\u0E7F]/.test(prompt)) return 'qwen-2.5-72b';
    return 'llama-3.3-70b';
}

async function sendMessage() {
    if (imageGenMode) return sendImageGeneration();
    if (isStreaming) return;
    const text = document.getElementById('messageInput').value.trim();
    if (!text && attachedFiles.length === 0) return;
    if (!currentThreadId || !threads[currentThreadId]) createNewThread();
    isStreaming = true;
    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;

    let finalText = text;
    let imageDataList = [];
    for (const file of attachedFiles) {
        if (file.type.startsWith('image/')) {
            imageDataList.push(file.dataUrl);
            finalText += `\n[Image attached]`;
        } else {
            finalText += `\n\n[Attached: ${file.name}]\nContent preview:\n${file.content.slice(0, 500)}`;
        }
    }

    const thread = threads[currentThreadId];
    const userMsg = { role: 'user', content: finalText, timestamp: new Date().toISOString(), images: imageDataList };
    thread.messages.push(userMsg);
    thread.updatedAt = new Date().toISOString();
    if (thread.title === 'New chat') thread.title = text.slice(0, 32) || 'Chat';
    saveThreads();
    appendMessageToDOM('user', finalText, userMsg.timestamp, thread.messages.length - 1, null, imageDataList);
    document.getElementById('messageInput').value = '';
    attachedFiles = [];
    document.getElementById('attachmentPreviews').innerHTML = '';
    updateSendButton();
    renderThreads();

    const selectedModel = autoModelEnabled ? selectAutoModel(text, imageDataList.length > 0) : manualModel;

    const typingDiv = document.createElement('div');
    typingDiv.className = 'typing-indicator';
    typingDiv.id = 'typing';
    typingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    document.getElementById('chatContainer').appendChild(typingDiv);
    scrollToBottom();

    const requestBody = {
        model: selectedModel,
        messages: thread.messages.map(m => {
            if (m.images && m.images.length) {
                return {
                    role: m.role,
                    content: [
                        { type: 'text', text: m.content },
                        ...m.images.map(img => ({ type: 'image_url', image_url: { url: img } }))
                    ]
                };
            }
            return { role: m.role, content: m.content };
        }),
        temperature,
        max_tokens: 4096,
        deep_research: deepThinkMode,
        web_search: webSearchMode,
        stream: true
    };

    if (currentAbortController) currentAbortController.abort();
    currentAbortController = new AbortController();

    let assistantDiv = null;
    let accumulated = '';

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody),
            signal: currentAbortController.signal
        });

        document.getElementById('typing')?.remove();

        if (!response.ok) {
            const errText = await response.text().catch(() => '');
            throw new Error(`HTTP ${response.status}${errText ? ': ' + errText.slice(0, 100) : ''}`);
        }

        assistantDiv = document.createElement('div');
        assistantDiv.className = 'message assistant';
        assistantDiv.innerHTML = `<div class="message-avatar">AI</div><div class="message-content"><div class="message-bubble"></div></div>`;
        document.getElementById('chatContainer').appendChild(assistantDiv);
        const bubble = assistantDiv.querySelector('.message-bubble');
        const wasAtBottom = isUserAtBottom();

        const contentType = response.headers.get('content-type') || '';

        if (!response.body || typeof response.body.getReader !== 'function') {
            const txt = await response.text();
            if (contentType.includes('application/json')) {
                try {
                    const json = JSON.parse(txt);
                    accumulated = json.choices?.[0]?.message?.content || json.choices?.[0]?.delta?.content || txt;
                } catch { accumulated = txt; }
            } else {
                accumulated = txt;
            }
            renderBubbleContent(bubble, accumulated, wasAtBottom);
        } else {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let done = false;

            while (!done) {
                const { value, done: readerDone } = await reader.read();
                if (readerDone) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split(/\r?\n/);
                buffer = lines.pop();

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    const data = line.slice(6).trim();
                    if (data === '[DONE]') { done = true; break; }
                    try {
                        const json = JSON.parse(data);
                        const delta = json.choices?.[0]?.delta?.content || '';
                        if (delta) {
                            accumulated += delta;
                            scheduleRender(bubble, accumulated, wasAtBottom);
                        }
                    } catch { }
                }
            }

            if (buffer.startsWith('data: ')) {
                const data = buffer.slice(6).trim();
                if (data && data !== '[DONE]') {
                    try {
                        const json = JSON.parse(data);
                        const delta = json.choices?.[0]?.delta?.content || '';
                        if (delta) accumulated += delta;
                    } catch { }
                }
            }

            renderBubbleContent(bubble, accumulated, wasAtBottom);
        }

        const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const infoBadge = hallucinationGuard
            ? `<div class="verification-badge"><i class="fas fa-info-circle"></i> ${escapeHtml(selectedModel)} · ${timeStr}</div>`
            : '';
        const feedbackBtns = `<div class="feedback-buttons"><button class="feedback-btn" data-feedback="correct"><i class="fas fa-thumbs-up"></i> Correct</button><button class="feedback-btn" data-feedback="wrong"><i class="fas fa-thumbs-down"></i> Hallucinated</button></div>`;
        const actions = `<div class="message-actions"><button class="action-btn" data-action="copy"><i class="fas fa-copy"></i> Copy</button><button class="action-btn" data-action="regenerate">⟳ Regenerate</button><button class="action-btn" data-action="delete">🗑️ Delete</button></div>`;
        assistantDiv.querySelector('.message-content').insertAdjacentHTML('beforeend', `${infoBadge}${feedbackBtns}${actions}`);

        thread.messages.push({
            role: 'assistant',
            content: accumulated,
            timestamp: new Date().toISOString(),
            verification: hallucinationGuard ? { model: selectedModel, time: timeStr } : null
        });
        saveThreads();
        attachMessageActions();

    } catch (err) {
        document.getElementById('typing')?.remove();
        if (err.name === 'AbortError') {
            assistantDiv?.remove();
        } else {
            if (assistantDiv) assistantDiv.remove();
            const errContent = `❌ Error: ${err.message}`;
            appendMessageToDOM('assistant', errContent, new Date().toISOString(), thread.messages.length);
            thread.messages.push({ role: 'assistant', content: errContent, timestamp: new Date().toISOString() });
            saveThreads();
            showToast(`Error: ${err.message}`, 'error');
        }
    } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        updateSendButton();
        currentAbortController = null;
    }
}

function updateSendButton() {
    const hasText = document.getElementById('messageInput').value.trim().length > 0;
    document.getElementById('sendBtn').disabled = isStreaming || (!hasText && attachedFiles.length === 0);
}

function renderThreads() {
    const container = document.getElementById('threadList');
    container.innerHTML = '';
    Object.values(threads)
        .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))
        .forEach(thread => {
            const isActive = thread.id === currentThreadId;
            const date = new Date(thread.updatedAt);
            const timeStr = date.toDateString() === new Date().toDateString()
                ? date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                : date.toLocaleDateString();
            const div = document.createElement('div');
            div.className = `thread-item${isActive ? ' active' : ''}`;
            div.dataset.id = thread.id;
            div.innerHTML = `
                <div class="thread-title">${escapeHtml(thread.title)}</div>
                <div class="thread-meta">${timeStr}</div>
                <div class="thread-menu">
                    <button class="menu-btn"><i class="fas fa-ellipsis-v"></i></button>
                    <div class="menu-dropdown">
                        <div class="menu-item" data-action="rename">✏️ Rename</div>
                        <div class="menu-item" data-action="delete">🗑️ Delete</div>
                    </div>
                </div>`;
            container.appendChild(div);
        });
    attachThreadEvents();
}

function attachThreadEvents() {
    document.querySelectorAll('.thread-item .menu-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const dropdown = btn.parentElement.querySelector('.menu-dropdown');
            document.querySelectorAll('.menu-dropdown').forEach(d => { if (d !== dropdown) d.classList.remove('active'); });
            dropdown.classList.toggle('active');
        });
    });
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', e => {
            e.stopPropagation();
            const threadId = item.closest('.thread-item').dataset.id;
            if (item.dataset.action === 'rename') renameThread(threadId);
            if (item.dataset.action === 'delete') deleteThread(threadId);
            item.closest('.menu-dropdown').classList.remove('active');
        });
    });
    document.querySelectorAll('.thread-item').forEach(item => {
        item.addEventListener('click', e => {
            if (e.target.closest('.thread-menu')) return;
            loadThread(item.dataset.id);
        });
    });
    document.addEventListener('click', () => {
        document.querySelectorAll('.menu-dropdown').forEach(d => d.classList.remove('active'));
    }, { once: false, capture: true });
}

function renameThread(id) {
    const thread = threads[id];
    if (!thread) return;
    const item = document.querySelector(`.thread-item[data-id="${id}"]`);
    if (!item) return;
    const titleEl = item.querySelector('.thread-title');
    const original = thread.title;
    const input = document.createElement('input');
    input.type = 'text';
    input.value = original;
    input.className = 'thread-rename-input';
    titleEl.replaceWith(input);
    input.focus(); input.select();
    let saved = false;
    const save = () => {
        if (saved) return; saved = true;
        thread.title = input.value.trim() || original;
        saveThreads();
        renderThreads();
        if (id === currentThreadId) document.getElementById('currentChatTitle').innerText = thread.title;
    };
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); save(); }
        if (e.key === 'Escape') { saved = true; renderThreads(); }
    });
    input.addEventListener('blur', save);
}

async function deleteThread(id) {
    const ok = await confirmAction('Delete this chat?');
    if (!ok) return;
    delete threads[id];
    if (id === currentThreadId) {
        const remaining = Object.keys(threads);
        if (remaining.length) loadThread(remaining[0]);
        else createNewThread();
    }
    saveThreads();
    renderThreads();
}

function createNewThread() {
    const id = Date.now().toString();
    threads[id] = { id, title: 'New chat', messages: [], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    currentThreadId = id;
    saveThreads();
    renderThreads();
    loadThread(id);
}

function loadThread(id) {
    const thread = threads[id];
    if (!thread) return;
    currentThreadId = id;
    document.getElementById('currentChatTitle').innerText = thread.title;
    const header = document.getElementById('chatHeader');
    const container = document.getElementById('chatContainer');
    while (container.firstChild) container.removeChild(container.firstChild);
    const welcome = document.createElement('div');
    welcome.className = 'welcome';
    welcome.id = 'welcomeScreen';
    welcome.innerHTML = '<h2>How can I help you?</h2>';
    container.appendChild(welcome);
    thread.messages.forEach((msg, idx) => {
        appendMessageToDOM(msg.role, msg.content, msg.timestamp, idx, msg.verification, msg.images || []);
    });
    if (thread.messages.length > 0) {
        welcome.style.display = 'none';
        header.style.display = 'flex';
    } else {
        welcome.style.display = '';
        header.style.display = 'none';
    }
    scrollToBottom();
    renderThreads();
    attachMessageActions();
}

document.getElementById('fileInput').addEventListener('change', e => {
    Array.from(e.target.files).forEach(file => {
        if (file.size > 5 * 1024 * 1024) { showToast('File too large (max 5MB)', 'error'); return; }
        const reader = new FileReader();
        reader.onload = ev => {
            const dataUrl = ev.target.result;
            attachedFiles.push({
                name: file.name,
                type: file.type,
                content: file.type.startsWith('image/') ? '[Image]' : ev.target.result,
                dataUrl: file.type.startsWith('image/') ? dataUrl : null
            });
            const previewDiv = document.getElementById('attachmentPreviews');
            const chip = document.createElement('div');
            chip.className = 'attachment-preview';
            chip.innerHTML = file.type.startsWith('image/')
                ? `<img src="${dataUrl}" style="width:28px;height:28px;object-fit:cover;border-radius:4px;"><span>${escapeHtml(file.name)}</span><i class="fas fa-times" style="margin-left:6px;cursor:pointer;color:var(--text-secondary);"></i>`
                : `<i class="fas fa-file"></i><span>${escapeHtml(file.name)}</span><i class="fas fa-times" style="margin-left:6px;cursor:pointer;color:var(--text-secondary);"></i>`;
            chip.querySelector('.fa-times').addEventListener('click', () => {
                attachedFiles = attachedFiles.filter(f => f.name !== file.name);
                chip.remove();
                updateSendButton();
            });
            previewDiv.appendChild(chip);
            updateSendButton();
        };
        if (file.type.startsWith('image/')) reader.readAsDataURL(file);
        else reader.readAsText(file, 'UTF-8');
    });
    e.target.value = '';
});

document.getElementById('newChatBtn').addEventListener('click', createNewThread);
document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('messageInput').addEventListener('input', () => {
    updateSendButton();
    const ta = document.getElementById('messageInput');
    ta.style.height = 'auto';
    ta.style.height = Math.min(120, ta.scrollHeight) + 'px';
});
document.getElementById('messageInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !document.getElementById('sendBtn').disabled) {
        e.preventDefault();
        sendMessage();
    }
});

document.getElementById('deepThinkBtn').addEventListener('click', () => {
    deepThinkMode = !deepThinkMode;
    document.getElementById('deepThinkBtn').classList.toggle('active', deepThinkMode);
    if (deepThinkMode) { codeReviewMode = false; document.getElementById('codeReviewBtn').classList.remove('active'); setImageMode(false); }
});
document.getElementById('webSearchBtn').addEventListener('click', () => {
    webSearchMode = !webSearchMode;
    document.getElementById('webSearchBtn').classList.toggle('active', webSearchMode);
    if (webSearchMode) setImageMode(false);
});
document.getElementById('codeReviewBtn').addEventListener('click', () => {
    codeReviewMode = !codeReviewMode;
    document.getElementById('codeReviewBtn').classList.toggle('active', codeReviewMode);
    if (codeReviewMode) { deepThinkMode = false; document.getElementById('deepThinkBtn').classList.remove('active'); setImageMode(false); }
});
document.getElementById('imageGenBtn').addEventListener('click', () => setImageMode(!imageGenMode));

document.querySelectorAll('.size-option').forEach(opt => {
    opt.addEventListener('click', () => {
        document.querySelectorAll('.size-option').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        selectedImageSize = opt.dataset.size;
    });
});

document.getElementById('settingsBtn').addEventListener('click', () => document.getElementById('settingsModal').classList.add('active'));
document.getElementById('closeSettings').addEventListener('click', () => document.getElementById('settingsModal').classList.remove('active'));
document.getElementById('settingsModal').addEventListener('click', e => {
    if (e.target === document.getElementById('settingsModal')) document.getElementById('settingsModal').classList.remove('active');
});
document.getElementById('autoModelToggle').addEventListener('click', () => {
    autoModelEnabled = !autoModelEnabled;
    document.getElementById('autoModelToggle').classList.toggle('active', autoModelEnabled);
    document.getElementById('manualModelContainer').style.display = autoModelEnabled ? 'none' : 'block';
    localStorage.setItem('yaz_auto_model', autoModelEnabled);
});
document.getElementById('manualModelSelect').addEventListener('change', e => {
    manualModel = e.target.value;
    localStorage.setItem('yaz_manual_model', manualModel);
});
document.getElementById('imageEngineSelect').addEventListener('change', e => {
    imageEngine = e.target.value;
    localStorage.setItem('yaz_image_engine', imageEngine);
});
document.getElementById('tempSlider').addEventListener('input', e => {
    temperature = parseFloat(e.target.value);
    document.getElementById('tempValue').innerText = temperature;
    localStorage.setItem('yaz_temperature', temperature);
});
document.getElementById('hallucinationGuardToggle').addEventListener('click', () => {
    hallucinationGuard = !hallucinationGuard;
    document.getElementById('hallucinationGuardToggle').classList.toggle('active', hallucinationGuard);
    localStorage.setItem('yaz_hallucination_guard', hallucinationGuard);
});
document.getElementById('themeSelect').addEventListener('change', e => applyTheme(e.target.value));

document.getElementById('exportDataBtn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(threads, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'yaz_chats.json';
    a.click();
    URL.revokeObjectURL(a.href);
});
document.getElementById('deleteAllChatsBtn').addEventListener('click', async () => {
    if (!await confirmAction('Delete ALL chats? This cannot be undone.')) return;
    threads = {};
    saveThreads();
    createNewThread();
    renderThreads();
});

document.getElementById('renameChatBtn').addEventListener('click', () => { if (currentThreadId) renameThread(currentThreadId); });
document.getElementById('exportChatBtn').addEventListener('click', () => {
    const thread = threads[currentThreadId];
    if (!thread?.messages?.length) { showToast('No messages to export', 'error'); return; }
    let content = `# ${thread.title}\n\n`;
    thread.messages.forEach(m => content += `## ${m.role === 'user' ? 'User' : 'AI'}\n${m.content}\n\n---\n\n`);
    const blob = new Blob([content], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `chat-${thread.id}.md`;
    a.click();
    URL.revokeObjectURL(a.href);
});
document.getElementById('clearChatBtn').addEventListener('click', async () => {
    if (!currentThreadId) return;
    if (!await confirmAction('Clear all messages in this chat?')) return;
    threads[currentThreadId].messages = [];
    threads[currentThreadId].title = 'New chat';
    saveThreads();
    loadThread(currentThreadId);
});
document.getElementById('closeChatBtn').addEventListener('click', () => {
    document.getElementById('chatHeader').style.display = 'none';
    const container = document.getElementById('chatContainer');
    while (container.firstChild) container.removeChild(container.firstChild);
    const welcome = document.createElement('div');
    welcome.className = 'welcome';
    welcome.id = 'welcomeScreen';
    welcome.innerHTML = '<h2>How can I help you?</h2>';
    container.appendChild(welcome);
    currentThreadId = null;
    renderThreads();
});
document.getElementById('sidebarToggleBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
});
document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'j') { e.preventDefault(); createNewThread(); }
    if (e.key === 'Escape') {
        document.getElementById('settingsModal').classList.remove('active');
        document.querySelectorAll('.menu-dropdown').forEach(d => d.classList.remove('active'));
    }
});

loadThreads();
loadTheme();
loadSettings();
if (Object.keys(threads).length === 0) createNewThread();
else loadThread(Object.keys(threads).sort((a, b) => new Date(threads[b].updatedAt) - new Date(threads[a].updatedAt))[0]);
renderThreads();
updateSendButton();
attachMessageActions();
</script>
</body>
</html>
