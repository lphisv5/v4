<body>
<div class="container">
    <div class="glass-header">
        <div class="logo-area">
            <h1><i class="fas fa-broadcast-tower"></i> YANZ EXECUTORS</h1>
        </div>
        <div class="live-stream-badge">
            <span class="live-dot-stream"></span>
            <span class="live-text">LIVE</span>
            <span id="liveTimestamp" class="timestamp-live">--:--:--</span>
        </div>
    </div>

    <div id="statsPanel" class="stats-panel">Loading stats...</div>

    <div class="control-bar">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="globalSearch" placeholder="Search executors...">
        </div>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <div data-filter="all" class="filter-chip active">All</div>
            <div data-filter="Android" class="filter-chip"><i class="fab fa-android"></i> Android</div>
            <div data-filter="iOS" class="filter-chip"><i class="fab fa-apple"></i> iOS</div>
            <div data-filter="Windows" class="filter-chip"><i class="fab fa-windows"></i> Windows</div>
            <div data-filter="MacOS" class="filter-chip"><i class="fas fa-desktop"></i> macOS</div>
            <div data-filter="External" class="filter-chip"><i class="fas fa-external-link-alt"></i> External</div>
        </div>
    </div>

    <div id="platformsContainer"></div>
    <footer> Discord: https://discord.gg/mNGeUVcjKB | Creator _lphisv5 </footer>
</div>

<script>
    const API_URL = "https://executors-one.vercel.app/executors";
    const UPDATE_INTERVAL_MS = 1000;
    
    let fullData = null;
    let activePlatform = "all";
    let searchTerm = "";
    let updateIntervalId = null;
    let isFetching = false;
    let lastSuccessTime = null;
    
    const logoCache = new Map();
    const failedLogos = new Set();
    const logoContainers = new Map();

    const statsDiv = document.getElementById("statsPanel");
    const platformsContainer = document.getElementById("platformsContainer");
    const searchInput = document.getElementById("globalSearch");
    const liveTimestampSpan = document.getElementById("liveTimestamp");

    const statIconMap = {
        Android: '<i class="fab fa-android"></i>',
        iOS: '<i class="fab fa-apple"></i>',
        Windows: '<i class="fab fa-windows"></i>',
        MacOS: '<i class="fas fa-desktop"></i>',
        External: '<i class="fas fa-external-link-alt"></i>'
    };

    function updateLiveClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-GB', { hour12: false });
        liveTimestampSpan.innerText = timeStr;
    }
    setInterval(updateLiveClock, 1000);
    updateLiveClock();

    function showToast(msg, isError = false) {
        let toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = isError ? '#dc2626' : '#10b981';
        toast.style.color = 'white';
        toast.style.padding = '8px 18px';
        toast.style.borderRadius = '40px';
        toast.style.fontSize = '0.8rem';
        toast.style.zIndex = '9999';
        toast.style.backdropFilter = 'blur(8px)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"]/g, (m) => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            return m;
        });
    }

    async function copyToClipboard(text, btn) {
        try {
            await navigator.clipboard.writeText(text);
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            setTimeout(() => { if(btn) btn.innerHTML = original; }, 1200);
        } catch(e) { showToast("Copy failed", true); }
    }

    function getLogoHtml(executor) {
        const cacheKey = `${executor.name}`;
        
        if (executor.logo && !failedLogos.has(executor.logo)) {
            if (!logoCache.has(cacheKey)) {
                logoCache.set(cacheKey, executor.logo);
            }
            return `<div class="executor-logo-container" data-executor="${escapeHtml(executor.name)}">
                        <img src="${escapeHtml(executor.logo)}" 
                             alt="${escapeHtml(executor.name)}" 
                             class="executor-logo"
                             loading="lazy"
                             onerror="handleLogoError(this, '${escapeHtml(executor.name)}')" />
                    </div>`;
        }
        
        const initial = (executor.name || '?').charAt(0).toUpperCase();
        return `<div class="executor-logo-container" data-executor="${escapeHtml(executor.name)}">
                    <div class="executor-logo-placeholder">${initial}</div>
                </div>`;
    }

    window.handleLogoError = function(imgElement, executorName) {
        const logoUrl = imgElement.src;
        failedLogos.add(logoUrl);
        
        const container = imgElement.parentElement;
        if (container) {
            const initial = (executorName || '?').charAt(0).toUpperCase();
            container.innerHTML = `<div class="executor-logo-placeholder">${initial}</div>`;
        }
    };

    function getFilteredData() {
        if (!fullData) return {};
        const platforms = ["Android", "iOS", "Windows", "MacOS", "External"];
        let result = {};
        for (let plat of platforms) {
            if (activePlatform !== "all" && activePlatform !== plat) {
                result[plat] = [];
                continue;
            }
            let execs = fullData[plat] || [];
            if (searchTerm.trim() !== "") {
                const term = searchTerm.toLowerCase();
                execs = execs.filter(ex => ex.name && ex.name.toLowerCase().includes(term));
            }
            result[plat] = execs;
        }
        return result;
    }

    function updateCardData(cardElement, executor) {
        const statusChip = cardElement.querySelector('.status-chip');
        if (statusChip) {
            const isOnline = executor.status === "Online";
            statusChip.className = `status-chip ${isOnline ? 'status-online' : 'status-offline'}`;
            statusChip.textContent = executor.status || 'Offline';
        }
        
        const versionEl = cardElement.querySelector('.version-text');
        if (versionEl) {
            versionEl.innerHTML = `<i class="fas fa-code-branch"></i> ${escapeHtml(executor.version || 'N/A')}`;
        }
        
        const actionButtons = cardElement.querySelector('.action-buttons');
        if (actionButtons) {
            let btnHtml = '';
            if (executor.downloadLink) btnHtml += `<a href="${escapeHtml(executor.downloadLink)}" target="_blank" class="btn-icon"><i class="fas fa-download"></i> Download</a>`;
            if (executor.purchaseLink) btnHtml += `<a href="${escapeHtml(executor.purchaseLink)}" target="_blank" class="btn-icon"><i class="fas fa-shopping-cart"></i> Purchase</a>`;
            if (executor.installCommand) {
                btnHtml += `<button class="btn-icon copy-cmd" data-cmd="${escapeHtml(executor.installCommand)}"><i class="fas fa-terminal"></i> Copy Cmd</button>`;
            }
            if (!executor.downloadLink && !executor.purchaseLink && !executor.installCommand) btnHtml += `<span class="btn-icon">No link</span>`;
            actionButtons.innerHTML = btnHtml;
        }
        
        const vngDetails = cardElement.querySelector('.vng-details');
        if (vngDetails) {
            if (executor.vngVersion || executor.vngStatus || executor.vngDownloadLink) {
                vngDetails.style.display = '';
                vngDetails.innerHTML = `
                    <i class="fas fa-code-branch"></i> VNG: ${escapeHtml(executor.vngVersion || '?')} 
                    ${executor.vngStatus ? `<span class="status-chip ${executor.vngStatus === 'Online' ? 'status-online' : 'status-offline'}" style="margin-left:5px;">${executor.vngStatus}</span>` : ''}
                    ${executor.vngDownloadLink ? `<div style="margin-top:5px;"><a href="${escapeHtml(executor.vngDownloadLink)}" target="_blank" class="btn-icon"><i class="fas fa-download"></i> VNG DL</a></div>` : ''}
                `;
            } else {
                vngDetails.style.display = 'none';
            }
        }
        
        cardElement.querySelectorAll('.copy-cmd').forEach(btn => {
            const cmd = btn.getAttribute('data-cmd');
            if (cmd) {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyToClipboard(cmd, btn);
                });
            }
        });
    }

    function renderCards() {
        if (!fullData) {
            platformsContainer.innerHTML = `<div class="no-results"><i class="fas fa-spinner fa-pulse"></i> Waiting for live stream data...</div>`;
            return;
        }
        
        const filteredData = getFilteredData();
        const platforms = ["Android", "iOS", "Windows", "MacOS", "External"];
        let html = '';
        let anyVisible = false;
        
        const currentExecutors = new Map();
        
        for (let plat of platforms) {
            const execs = filteredData[plat];
            if (activePlatform !== "all" && activePlatform !== plat) continue;
            if (execs.length === 0 && activePlatform === "all") continue;
            anyVisible = true;
            const totalOriginal = fullData[plat]?.length || 0;
            const onlineOriginal = fullData[plat]?.filter(ex=>ex.status==="Online").length || 0;
            
            let headerIcon = '';
            if (plat === 'Android') headerIcon = '<i class="fab fa-android"></i>';
            else if (plat === 'iOS') headerIcon = '<i class="fab fa-apple"></i>';
            else if (plat === 'Windows') headerIcon = '<i class="fab fa-windows"></i>';
            else if (plat === 'MacOS') headerIcon = '<i class="fas fa-desktop"></i>';
            else if (plat === 'External') headerIcon = '<i class="fas fa-external-link-alt"></i>';
            
            html += `<div class="platform-section" data-platform="${plat}">
                        <div class="section-header">
                            <div>${headerIcon} <strong>${plat}</strong></div>
                            <div class="filter-chip" style="background:#0f172a;" data-platform-count="${plat}">${execs.length} / ${totalOriginal}  |  🟢 ${onlineOriginal}</div>
                        </div>
                        <div class="card-grid">`;
            
            for (let ex of execs) {
                const key = `${plat}-${ex.name}`;
                currentExecutors.set(key, ex);
                
                const isOnline = ex.status === "Online";
                const statusClass = isOnline ? "status-online" : "status-offline";
                const premiumFlag = ex.type === "Premium" || ex.purchaseLink;
                
                const logoHtml = getLogoHtml(ex);
                
                html += `<div class="exec-card" data-executor-key="${escapeHtml(key)}">
                            <div class="card-inner">
                                <div class="card-title-row">
                                    <div class="exec-name">
                                        ${logoHtml}
                                        <span>${escapeHtml(ex.name || '?')}</span>
                                        ${premiumFlag ? '<span class="premium-badge"><i class="fas fa-gem"></i> Premium</span>' : ''}
                                    </div>
                                    <div class="status-chip ${statusClass}">${ex.status || 'Offline'}</div>
                                </div>
                                <div class="version-text"><i class="fas fa-code-branch"></i> ${escapeHtml(ex.version || 'N/A')}</div>
                                <div class="action-buttons">`;
                if (ex.downloadLink) html += `<a href="${escapeHtml(ex.downloadLink)}" target="_blank" class="btn-icon"><i class="fas fa-download"></i> Download</a>`;
                if (ex.purchaseLink) html += `<a href="${escapeHtml(ex.purchaseLink)}" target="_blank" class="btn-icon"><i class="fas fa-shopping-cart"></i> Purchase</a>`;
                if (ex.installCommand) {
                    html += `<button class="btn-icon copy-cmd" data-cmd="${escapeHtml(ex.installCommand)}"><i class="fas fa-terminal"></i> Copy Cmd</button>`;
                }
                if (!ex.downloadLink && !ex.purchaseLink && !ex.installCommand) html += `<span class="btn-icon">No link</span>`;
                html += `</div>`;
                
                if (plat === "Android" && (ex.vngVersion || ex.vngStatus || ex.vngDownloadLink)) {
                    html += `<div class="vng-details">
                                <i class="fas fa-code-branch"></i> VNG: ${escapeHtml(ex.vngVersion || '?')} 
                                ${ex.vngStatus ? `<span class="status-chip ${ex.vngStatus === 'Online' ? 'status-online' : 'status-offline'}" style="margin-left:5px;">${ex.vngStatus}</span>` : ''}
                                ${ex.vngDownloadLink ? `<div style="margin-top:5px;"><a href="${escapeHtml(ex.vngDownloadLink)}" target="_blank" class="btn-icon"><i class="fas fa-download"></i> VNG DL</a></div>` : ''}
                            </div>`;
                } else if (plat === "Android") {
                    html += `<div class="vng-details" style="display:none;"></div>`;
                }
                
                html += `</div></div>`;
            }
            html += `</div></div>`;
        }
        
        if (!anyVisible && activePlatform !== "all") html = `<div class="no-results"><i class="fas fa-filter"></i> No results for selected platform</div>`;
        else if (!anyVisible) html = `<div class="no-results">No executor data found</div>`;
        
        platformsContainer.innerHTML = html;
        
        document.querySelectorAll('.copy-cmd').forEach(btn => {
            const cmd = btn.getAttribute('data-cmd');
            if (cmd) {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyToClipboard(cmd, btn);
                });
            }
        });
    }

    function updateExistingCards() {
        if (!fullData) return;
        
        const filteredData = getFilteredData();
        
        document.querySelectorAll('[data-platform-count]').forEach(el => {
            const plat = el.getAttribute('data-platform-count');
            if (plat && filteredData[plat]) {
                const execs = filteredData[plat];
                const totalOriginal = fullData[plat]?.length || 0;
                const onlineOriginal = fullData[plat]?.filter(ex=>ex.status==="Online").length || 0;
                el.textContent = `${execs.length} / ${totalOriginal}  |  🟢 ${onlineOriginal}`;
            }
        });
        
        document.querySelectorAll('.exec-card').forEach(card => {
            const key = card.getAttribute('data-executor-key');
            if (!key) return;
            
            for (const plat of ["Android", "iOS", "Windows", "MacOS", "External"]) {
                const execs = filteredData[plat] || [];
                const executor = execs.find(ex => `${plat}-${ex.name}` === key);
                if (executor) {
                    updateCardData(card, executor);
                    break;
                }
            }
        });
    }

    async function fetchLiveData(showToastMsg = false) {
        if (isFetching) return;
        isFetching = true;
        try {
            const timeout = new Promise((_, reject) =>
                setTimeout(() => reject(new Error("Request timed out")), 7000)
            );
            const response = await Promise.race([fetch(API_URL), timeout]);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            fullData = data;
            lastSuccessTime = Date.now();
        
            if (!platformsContainer.querySelector('.exec-card')) {
                renderCards();
            } else {
                updateExistingCards();
            }
            
            renderStats();
            if (showToastMsg) showToast("Live data refreshed", false);
        } catch (err) {
            console.warn("Fetch error:", err);
            if (showToastMsg) showToast(`API error: ${err.message}`, true);
            if (!fullData) {
                platformsContainer.innerHTML = `<div class="no-results"><i class="fas fa-exclamation-triangle"></i> Cannot reach API. Retrying every 1s...<br>${err.message}</div>`;
            }
        } finally {
            isFetching = false;
        }
    }

    function startLiveStream() {
        if (updateIntervalId) clearInterval(updateIntervalId);
        fetchLiveData(false);
        updateIntervalId = setInterval(() => {
            fetchLiveData(false);
        }, UPDATE_INTERVAL_MS);
    }

    function bindControls() {
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderCards();
        });
        document.querySelectorAll('[data-filter]').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('[data-filter]').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                activePlatform = chip.getAttribute('data-filter');
                renderCards();
            });
        });
    }

    function init() {
        bindControls();
        startLiveStream();
    }
    init();
</script>
</body>
</html>
