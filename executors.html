<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="keywords" content="YANZ, executors, roblox, tools, scripts">
<meta name="theme-color" content="#7c3aed">
<title>YANZ EXECUTORS | Next-Gen Hub</title>

<!-- Fonts & Icons -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ========== 🎨 CSS VARIABLES & RESET ========== */
:root {
    --bg-primary: #030712;
    --bg-secondary: #0f172a;
    --glass-bg: rgba(30, 41, 59, 0.4);
    --glass-border: rgba(148, 163, 184, 0.15);
    --glass-highlight: rgba(255, 255, 255, 0.08);
    
    --primary: #8b5cf6;
    --primary-glow: rgba(139, 92, 246, 0.5);
    --secondary: #06b6d4;
    --secondary-glow: rgba(6, 182, 212, 0.4);
    --accent: #f59e0b;
    --success: #10b981;
    --danger: #ef4444;
    
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    
    --card-radius: 24px;
    --btn-radius: 14px;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-smooth: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.6;
}

/* ========== 🌌 ANIMATED BACKGROUND ========== */
.animated-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2;
    background: 
        radial-gradient(ellipse at 20% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(6, 182, 212, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(245, 158, 11, 0.08) 0%, transparent 70%),
        linear-gradient(135deg, #030712 0%, #0a0f1d 50%, #030712 100%);
    animation: bgPulse 15s ease-in-out infinite;
}

@keyframes bgPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.95; transform: scale(1.02); }
}

/* Particles */
.particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    pointer-events: none;
    overflow: hidden;
}

.particle {
    position: absolute;
    width: 4px; height: 4px;
    background: var(--primary);
    border-radius: 50%;
    opacity: 0.6;
    animation: float 20s infinite linear;
    box-shadow: 0 0 10px var(--primary-glow);
}

.particle:nth-child(2n) {
    background: var(--secondary);
    box-shadow: 0 0 10px var(--secondary-glow);
    animation-duration: 25s;
    animation-delay: -10s;
}

.particle:nth-child(3n) {
    background: var(--accent);
    animation-duration: 30s;
    animation-delay: -5s;
}

@keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
}

/* ========== 🪄 GLOW EFFECTS ========== */
.glow-on-hover {
    position: relative;
    transition: var(--transition);
}

.glow-on-hover::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px;
    right: -2px; bottom: -2px;
    background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent), var(--primary));
    background-size: 400%;
    border-radius: inherit;
    z-index: -1;
    opacity: 0;
    transition: opacity 0.3s ease;
    animation: gradientFlow 8s linear infinite;
}

.glow-on-hover:hover::before {
    opacity: 1;
}

@keyframes gradientFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.glow-on-hover:hover {
    transform: translateY(-3px);
    box-shadow: 
        0 20px 40px rgba(0,0,0,0.4),
        0 0 60px var(--primary-glow);
}

/* ========== 🏗️ LAYOUT ========== */
.container {
    max-width: 1600px;
    margin: 0 auto;
    padding: 1.5rem;
}

/* ========== 🎪 HEADER ========== */
.header {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: var(--card-radius);
    padding: 1.5rem 2rem;
    margin-bottom: 2rem;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    position: relative;
    overflow: hidden;
    animation: slideDown 0.6s ease-out;
}

.header::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
    animation: shimmer 3s infinite;
}

@keyframes shimmer {
    100% { left: 100%; }
}

@keyframes slideDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
}

.logo-area {
    display: flex;
    align-items: center;
    gap: 1rem;
}

.logo-icon {
    width: 50px; height: 50px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    animation: pulse 2s infinite;
    box-shadow: 0 0 30px var(--primary-glow);
}

@keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 30px var(--primary-glow); }
    50% { transform: scale(1.05); box-shadow: 0 0 50px var(--primary-glow); }
}

.logo-area h1 {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.5px;
}

/* Live Badge */
.live-badge {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid var(--danger);
    border-radius: 50px;
    padding: 0.5rem 1.2rem;
    font-weight: 600;
    font-size: 0.85rem;
    animation: bounceIn 0.5s ease-out;
}

@keyframes bounceIn {
    0% { transform: scale(0.8); opacity: 0; }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
}

.live-dot {
    width: 10px; height: 10px;
    background: var(--danger);
    border-radius: 50%;
    animation: pulseRed 1s infinite;
    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
}

@keyframes pulseRed {
    0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
    70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
    100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
}

.live-time {
    font-family: 'SF Mono', 'Monaco', monospace;
    background: rgba(0,0,0,0.3);
    padding: 0.25rem 0.75rem;
    border-radius: 8px;
    font-size: 0.8rem;
    letter-spacing: 1px;
}

/* ========== 📊 STATS PANEL ========== */
.stats-panel {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
    animation: slideUp 0.6s ease-out 0.1s backwards;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.stat-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 1.2rem 1rem;
    text-align: center;
    transition: var(--transition-smooth);
    cursor: default;
}

.stat-card:hover {
    transform: translateY(-5px);
    border-color: var(--primary);
    box-shadow: 0 10px 30px rgba(139, 92, 246, 0.2);
}

.stat-icon {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.stat-value {
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 0.25rem;
}

.stat-label {
    font-size: 0.75rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.stat-online { color: var(--success); }
.stat-offline { color: var(--danger); }

/* ========== 🔍 CONTROL BAR ========== */
.control-bar {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--card-radius);
    padding: 1rem 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 1rem;
    justify-content: space-between;
    animation: slideUp 0.6s ease-out 0.2s backwards;
}

.search-box {
    position: relative;
    flex: 1;
    max-width: 400px;
}

.search-box i {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    transition: var(--transition);
}

.search-box input {
    width: 100%;
    padding: 0.8rem 1rem 0.8rem 2.8rem;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid var(--glass-border);
    border-radius: var(--btn-radius);
    color: var(--text-primary);
    font-size: 0.95rem;
    transition: var(--transition);
    outline: none;
}

.search-box input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-glow);
}

.search-box input:focus + i {
    color: var(--primary);
}

.filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
}

.filter-chip {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid var(--glass-border);
    border-radius: 50px;
    padding: 0.5rem 1.2rem;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 0.4rem;
}

.filter-chip:hover,
.filter-chip.active {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 5px 20px var(--primary-glow);
}

.filter-chip i { font-size: 0.75rem; }

/* ========== 🎴 PLATFORM SECTIONS ========== */
.platform-section {
    margin-bottom: 2.5rem;
    animation: fadeIn 0.5s ease-out backwards;
}

.platform-section:nth-child(1) { animation-delay: 0.3s; }
.platform-section:nth-child(2) { animation-delay: 0.4s; }
.platform-section:nth-child(3) { animation-delay: 0.5s; }
.platform-section:nth-child(4) { animation-delay: 0.6s; }
.platform-section:nth-child(5) { animation-delay: 0.7s; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.2rem;
    padding: 0 0.5rem;
}

.section-title {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 1.3rem;
    font-weight: 700;
}

.section-title i {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.section-count {
    background: rgba(15, 23, 42, 0.8);
    border: 1px solid var(--glass-border);
    border-radius: 50px;
    padding: 0.35rem 1rem;
    font-size: 0.75rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.online-count { color: var(--success); }

/* ========== 🃏 EXECUTOR CARDS ========== */
.card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.2rem;
}

.exec-card {
    background: linear-gradient(145deg, rgba(30, 41, 59, 0.6), rgba(15, 23, 42, 0.8));
    border: 1px solid var(--glass-border);
    border-radius: var(--card-radius);
    overflow: hidden;
    transition: var(--transition-smooth);
    transform-style: preserve-3d;
    perspective: 1000px;
    opacity: 0;
    animation: cardEntrance 0.5s ease-out forwards;
}

.exec-card.visible {
    opacity: 1;
}

@keyframes cardEntrance {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

.exec-card:hover {
    transform: translateY(-8px) scale(1.02);
    border-color: var(--primary);
    box-shadow: 
        0 25px 50px rgba(0,0,0,0.5),
        0 0 80px var(--primary-glow);
}

.exec-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
    opacity: 0;
    transition: opacity 0.3s ease;
}

.exec-card:hover::before {
    opacity: 1;
}

.card-inner {
    padding: 1.4rem;
}

/* Card Header */
.card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
    gap: 1rem;
}

.exec-info {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    flex: 1;
    min-width: 0;
}

.exec-logo {
    width: 48px; height: 48px;
    border-radius: 14px;
    object-fit: contain;
    background: rgba(255,255,255,0.05);
    padding: 6px;
    border: 1px solid var(--glass-border);
    flex-shrink: 0;
    transition: var(--transition);
}

.exec-card:hover .exec-logo {
    transform: scale(1.1) rotate(5deg);
    border-color: var(--primary);
}

.exec-logo-placeholder {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1.1rem;
    color: white;
    border: 1px solid var(--glass-border);
    flex-shrink: 0;
}

.exec-name {
    font-size: 1.15rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.premium-badge {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: white;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    animation: shimmer 3s infinite;
}

/* Status Badge */
.status-badge {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.35rem 0.8rem;
    border-radius: 50px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
}

.status-online {
    background: rgba(16, 185, 129, 0.15);
    color: var(--success);
    border: 1px solid var(--success);
}

.status-online::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--success);
    border-radius: 50%;
    animation: pulseGreen 1.5s infinite;
}

@keyframes pulseGreen {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.3); }
}

.status-offline {
    background: rgba(239, 68, 68, 0.15);
    color: var(--danger);
    border: 1px solid var(--danger);
}

/* Version & Details */
.version-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 0.35rem 0.75rem;
    font-size: 0.75rem;
    font-family: 'SF Mono', monospace;
    color: var(--text-secondary);
    margin-bottom: 1rem;
}

.version-badge i { color: var(--secondary); }

/* Action Buttons */
.action-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 1rem;
}

.btn {
    background: rgba(15, 23, 42, 0.8);
    border: 1px solid var(--glass-border);
    border-radius: var(--btn-radius);
    padding: 0.5rem 1rem;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
}

.btn:hover {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px var(--primary-glow);
}

.btn-download:hover {
    background: var(--success);
    border-color: var(--success);
    box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
}

.btn-purchase:hover {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
}

.btn-copy:hover {
    background: var(--secondary);
    border-color: var(--secondary);
    box-shadow: 0 5px 15px var(--secondary-glow);
}

/* VNG Section */
.vng-section {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px dashed var(--glass-border);
}

.vng-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 0.6rem;
}

.vng-header i { color: var(--accent); }

/* ========== 📭 EMPTY STATES ========== */
.no-results {
    text-align: center;
    padding: 4rem 2rem;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--card-radius);
    animation: fadeIn 0.5s ease-out;
}

.no-results i {
    font-size: 3rem;
    color: var(--text-muted);
    margin-bottom: 1rem;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.no-results p {
    color: var(--text-secondary);
    font-size: 1.1rem;
}

/* ========== 🦶 FOOTER ========== */
footer {
    text-align: center;
    padding: 2rem;
    margin-top: 3rem;
    border-top: 1px solid var(--glass-border);
    animation: fadeIn 0.5s ease-out 0.8s backwards;
}

footer a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    transition: var(--transition);
}

footer a:hover {
    color: var(--secondary);
    text-decoration: underline;
}

/* ========== 🎭 TOAST NOTIFICATIONS ========== */
.toast-container {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    pointer-events: none;
}

.toast {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 0.8rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.9rem;
    font-weight: 500;
    backdrop-filter: blur(10px);
    animation: toastSlide 0.3s ease-out, toastFade 0.3s ease-out 2.7s forwards;
    pointer-events: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.toast.success {
    border-left: 4px solid var(--success);
    color: var(--success);
}

.toast.error {
    border-left: 4px solid var(--danger);
    color: var(--danger);
}

@keyframes toastSlide {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes toastFade {
    to { opacity: 0; transform: translateY(-10px); }
}

/* ========== 🔄 LOADING SKELETON ========== */
.skeleton {
    background: linear-gradient(90deg, var(--glass-bg) 25%, var(--glass-highlight) 50%, var(--glass-bg) 75%);
    background-size: 200% 100%;
    animation: skeletonLoading 1.5s infinite;
    border-radius: 8px;
}

@keyframes skeletonLoading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

.skeleton-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--card-radius);
    padding: 1.4rem;
}

.skeleton-card .skeleton {
    margin-bottom: 0.8rem;
}

.skeleton-card .skeleton:last-child {
    margin-bottom: 0;
}

/* ========== 📱 RESPONSIVE ========== */
@media (max-width: 768px) {
    .container { padding: 1rem; }
    
    .header {
        padding: 1rem 1.5rem;
        flex-direction: column;
        text-align: center;
    }
    
    .logo-area h1 { font-size: 1.5rem; }
    
    .control-bar {
        flex-direction: column;
        align-items: stretch;
    }
    
    .search-box { max-width: 100%; }
    
    .filter-chips {
        justify-content: center;
    }
    
    .card-grid {
        grid-template-columns: 1fr;
    }
    
    .exec-card:hover {
        transform: translateY(-4px) scale(1.01);
    }
}

/* ========== 🎨 CUSTOM SCROLLBAR ========== */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: var(--bg-secondary);
}

::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: var(--secondary);
}

/* Selection */
::selection {
    background: var(--primary);
    color: white;
}
</style>
</head>
<body>

<!-- Animated Background -->
<div class="animated-bg"></div>
<div class="particles" id="particles"></div>

<div class="container">
    <!-- Header -->
    <header class="header">
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-bolt"></i>
            </div>
            <h1>YANZ EXECUTORS</h1>
        </div>
        <div class="live-badge">
            <span class="live-dot"></span>
            <span>LIVE</span>
            <span id="liveTime" class="live-time">--:--:--</span>
        </div>
    </header>

    <!-- Stats Panel -->
    <div id="statsPanel" class="stats-panel">
        <!-- Stats will be injected here -->
    </div>

    <!-- Control Bar -->
    <div class="control-bar">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="globalSearch" placeholder="Search executors...">
        </div>
        <div class="filter-chips">
            <div class="filter-chip active" data-filter="all">
                <i class="fas fa-layer-group"></i> All
            </div>
            <div class="filter-chip" data-filter="Android">
                <i class="fab fa-android"></i> Android
            </div>
            <div class="filter-chip" data-filter="iOS">
                <i class="fab fa-apple"></i> iOS
            </div>
            <div class="filter-chip" data-filter="Windows">
                <i class="fab fa-windows"></i> Windows
            </div>
            <div class="filter-chip" data-filter="MacOS">
                <i class="fas fa-desktop"></i> macOS
            </div>
            <div class="filter-chip" data-filter="External">
                <i class="fas fa-external-link-alt"></i> External
            </div>
        </div>
    </div>

    <!-- Platforms Container -->
    <div id="platformsContainer">
        <!-- Cards will be injected here -->
    </div>

    <!-- Footer -->
    <footer>
        <p>
            <i class="fab fa-discord"></i> 
            Join Discord: <a href="https://discord.gg/mNGeUVcjKB" target="_blank">discord.gg/mNGeUVcjKB</a>
            <br>
            <span style="opacity: 0.6;">Creator: _lphisv5 | © 2026 YANZ</span>
        </p>
    </footer>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
/* ========== ⚙️ CONFIG ========== */
const API_URL = "https://executors-one.vercel.app/executors";
const UPDATE_INTERVAL = 1000;

/* ========== 🌟 STATE ========== */
let fullData = null;
let activeFilter = "all";
let searchQuery = "";
let updateTimer = null;
let isFetching = false;

/* ========== 🎨 PARTICLES ========== */
function createParticles() {
    const container = document.getElementById('particles');
    const particleCount = 50;
    
    for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = (15 + Math.random() * 20) + 's';
        container.appendChild(particle);
    }
}

/* ========== 🕐 LIVE CLOCK ========== */
function updateLiveClock() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-GB', { hour12: false });
    document.getElementById('liveTime').textContent = timeStr;
}
setInterval(updateLiveClock, 1000);
updateLiveClock();

/* ========== 🔔 TOAST NOTIFICATIONS ========== */
function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `
        <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
        <span>${message}</span>
    `;
    container.appendChild(toast);
    
    setTimeout(() => toast.remove(), 3000);
}

/* ========== 📋 COPY TO CLIPBOARD ========== */
async function copyToClipboard(text, btn) {
    try {
        await navigator.clipboard.writeText(text);
        const original = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        setTimeout(() => btn.innerHTML = original, 1500);
        showToast('Command copied!', 'success');
    } catch {
        showToast('Copy failed', 'error');
    }
}

/* ========== 🖼️ LOGO HANDLING ========== */
function getLogoHTML(executor) {
    if (executor.logo) {
        return `
            <img src="${executor.logo}" 
                 alt="${executor.name}" 
                 class="exec-logo"
                 loading="lazy"
                 onerror="this.parentElement.innerHTML='<div class=\\'exec-logo-placeholder\\'>${executor.name.charAt(0).toUpperCase()}</div>'">
        `;
    }
    return `<div class="exec-logo-placeholder">${executor.name?.charAt(0).toUpperCase() || '?'}</div>`;
}

/* ========== 📊 RENDER STATS ========== */
function renderStats(data) {
    const platforms = ['Android', 'iOS', 'Windows', 'MacOS', 'External'];
    const icons = {
        Android: '<i class="fab fa-android"></i>',
        iOS: '<i class="fab fa-apple"></i>',
        Windows: '<i class="fab fa-windows"></i>',
        MacOS: '<i class="fas fa-desktop"></i>',
        External: '<i class="fas fa-external-link-alt"></i>'
    };
    
    let html = '';
    
    // Total Stats
    const total = Object.values(data).flat().length;
    const online = Object.values(data).flat().filter(e => e.status === 'Online').length;
    
    html += `
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-cube"></i></div>
            <div class="stat-value">${total}</div>
            <div class="stat-label">Total Executors</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-signal"></i></div>
            <div class="stat-value stat-online">${online}</div>
            <div class="stat-label">Online</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-plug"></i></div>
            <div class="stat-value stat-offline">${total - online}</div>
            <div class="stat-label">Offline</div>
        </div>
    `;
    
    // Platform Stats
    platforms.forEach(platform => {
        const execs = data[platform] || [];
        const onlineCount = execs.filter(e => e.status === 'Online').length;
        html += `
            <div class="stat-card">
                <div class="stat-icon">${icons[platform]}</div>
                <div class="stat-value">${execs.length}</div>
                <div class="stat-label">${platform}</div>
            </div>
        `;
    });
    
    document.getElementById('statsPanel').innerHTML = html;
}

/* ========== 🃏 RENDER CARDS ========== */
function renderCards() {
    if (!fullData) {
        document.getElementById('platformsContainer').innerHTML = `
            <div class="no-results">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading live data stream...</p>
            </div>
        `;
        return;
    }
    
    const platforms = ['Android', 'iOS', 'Windows', 'MacOS', 'External'];
    let html = '';
    let hasResults = false;
    
    platforms.forEach((platform, index) => {
        if (activeFilter !== 'all' && activeFilter !== platform) return;
        
        let execs = fullData[platform] || [];
        
        // Filter by search
        if (searchQuery) {
            const query = searchQuery.toLowerCase();
            execs = execs.filter(ex => ex.name?.toLowerCase().includes(query));
        }
        
        if (execs.length === 0 && activeFilter === 'all') return;
        hasResults = true;
        
        const total = fullData[platform]?.length || 0;
        const online = fullData[platform]?.filter(e => e.status === 'Online').length || 0;
        
        const platformIcons = {
            Android: '<i class="fab fa-android"></i>',
            iOS: '<i class="fab fa-apple"></i>',
            Windows: '<i class="fab fa-windows"></i>',
            MacOS: '<i class="fas fa-desktop"></i>',
            External: '<i class="fas fa-external-link-alt"></i>'
        };
        
        html += `
            <div class="platform-section" style="animation-delay: ${0.3 + index * 0.1}s">
                <div class="section-header">
                    <div class="section-title">
                        ${platformIcons[platform]} ${platform}
                    </div>
                    <div class="section-count">
                        <span>${execs.length}/${total}</span>
                        <span class="online-count">🟢 ${online}</span>
                    </div>
                </div>
                <div class="card-grid">
        `;
        
        execs.forEach((executor, cardIndex) => {
            const isOnline = executor.status === 'Online';
            const isPremium = executor.type === 'Premium' || executor.purchaseLink;
            const key = `${platform}-${executor.name}`;
            
            html += `
                <div class="exec-card glow-on-hover" data-key="${key}" style="animation-delay: ${cardIndex * 0.05}s">
                    <div class="card-inner">
                        <div class="card-header">
                            <div class="exec-info">
                                ${getLogoHTML(executor)}
                                <div>
                                    <div class="exec-name">${executor.name || 'Unknown'}</div>
                                    ${isPremium ? '<span class="premium-badge"><i class="fas fa-gem"></i> Premium</span>' : ''}
                                </div>
                            </div>
                            <div class="status-badge ${isOnline ? 'status-online' : 'status-offline'}">
                                ${executor.status || 'Offline'}
                            </div>
                        </div>
                        
                        <div class="version-badge">
                            <i class="fas fa-code-branch"></i>
                            v${executor.version || 'N/A'}
                        </div>
                        
                        <div class="action-buttons">
                            ${executor.downloadLink ? `
                                <a href="${executor.downloadLink}" target="_blank" class="btn btn-download">
                                    <i class="fas fa-download"></i> Download
                                </a>
                            ` : ''}
                            ${executor.purchaseLink ? `
                                <a href="${executor.purchaseLink}" target="_blank" class="btn btn-purchase">
                                    <i class="fas fa-shopping-cart"></i> Purchase
                                </a>
                            ` : ''}
                            ${executor.installCommand ? `
                                <button class="btn btn-copy" onclick="copyToClipboard('${executor.installCommand}', this)">
                                    <i class="fas fa-terminal"></i> Copy Cmd
                                </button>
                            ` : ''}
                            ${!executor.downloadLink && !executor.purchaseLink && !executor.installCommand ? 
                                '<span class="btn">No link</span>' : ''}
                        </div>
                        
                        ${platform === 'Android' && (executor.vngVersion || executor.vngDownloadLink) ? `
                            <div class="vng-section">
                                <div class="vng-header">
                                    <i class="fas fa-code-branch"></i> VNG Version
                                </div>
                                <div style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
                                    ${executor.vngVersion || 'N/A'}
                                    ${executor.vngStatus ? `
                                        <span class="status-badge ${executor.vngStatus === 'Online' ? 'status-online' : 'status-offline'}" style="margin-left: 0.5rem; padding: 0.2rem 0.5rem;">
                                            ${executor.vngStatus}
                                        </span>
                                    ` : ''}
                                </div>
                                ${executor.vngDownloadLink ? `
                                    <a href="${executor.vngDownloadLink}" target="_blank" class="btn btn-download" style="width: 100%; justify-content: center;">
                                        <i class="fas fa-download"></i> Download VNG
                                    </a>
                                ` : ''}
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        });
        
        html += `</div></div>`;
    });
    
    if (!hasResults) {
        html = `
            <div class="no-results">
                <i class="fas fa-search"></i>
                <p>No executors found for "${searchQuery}"</p>
            </div>
        `;
    }
    
    document.getElementById('platformsContainer').innerHTML = html;
    
    // Trigger entrance animations
    setTimeout(() => {
        document.querySelectorAll('.exec-card').forEach(card => {
            card.classList.add('visible');
        });
    }, 100);
}

/* ========== 🔍 FILTER & SEARCH ========== */
function setupControls() {
    // Search
    document.getElementById('globalSearch').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderCards();
    });
    
    // Filter chips
    document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            activeFilter = chip.dataset.filter;
            renderCards();
            showToast(`Showing ${activeFilter === 'all' ? 'all platforms' : activeFilter}`, 'success');
        });
    });
}

/* ========== 📡 FETCH DATA ========== */
async function fetchData(showToast = false) {
    if (isFetching) return;
    isFetching = true;
    
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 7000);
        
        const response = await fetch(API_URL, { signal: controller.signal });
        clearTimeout(timeout);
        
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const data = await response.json();
        fullData = data;
        
        renderStats(data);
        renderCards();
        
        if (showToast) showToast('Data refreshed', 'success');
        
    } catch (error) {
        console.warn('Fetch error:', error);
        if (showToast) showToast('Connection error', 'error');
        
        if (!fullData) {
            document.getElementById('platformsContainer').innerHTML = `
                <div class="no-results">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Cannot connect to API<br><small style="opacity: 0.6">${error.message}</small></p>
                </div>
            `;
        }
    } finally {
        isFetching = false;
    }
}

/* ========== 🔄 AUTO UPDATE ========== */
function startAutoUpdate() {
    fetchData(false);
    updateTimer = setInterval(() => fetchData(false), UPDATE_INTERVAL);
}

/* ========== 🎬 INIT ========== */
function init() {
    createParticles();
    setupControls();
    startAutoUpdate();
}

init();
</script>
</body>
</html>
