<style>
:root {
    --bg-dark: #05070f;
    --bg-card: rgba(15, 20, 40, 0.6);
    --bg-card-hover: rgba(25, 35, 70, 0.8);
    --primary: #7c3aed;
    --primary-glow: rgba(124, 58, 237, 0.5);
    --secondary: #06b6d4;
    --secondary-glow: rgba(6, 182, 212, 0.4);
    --accent: #f59e0b;
    --success: #10b981;
    --danger: #ef4444;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --border: rgba(100, 120, 180, 0.3);
    --border-hover: rgba(124, 58, 237, 0.6);
    --glass-blur: blur(20px);
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --shadow-neon: 0 0 20px var(--primary-glow), 0 0 40px var(--secondary-glow);
    --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg-dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.6;
}

/* ========== 🎨 BACKGROUND ========== */
#bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2;
    pointer-events: none;
}

.bg-gradient {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: 
        radial-gradient(ellipse at 20% 80%, rgba(124,58,237,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(6,182,212,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(245,158,11,0.08) 0%, transparent 60%);
    z-index: -1;
    animation: gradientShift 20s ease infinite;
}

@keyframes gradientShift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(2%, -2%) scale(1.02); }
    50% { transform: translate(-1%, 3%) scale(0.98); }
    75% { transform: translate(3%, 1%) scale(1.01); }
}

.bg-grid {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: 
        linear-gradient(rgba(100,120,180,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100,120,180,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: -1;
    animation: gridMove 30s linear infinite;
}

@keyframes gridMove {
    0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
    100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
}

.visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
}

/* ========== 🏗️ LAYOUT ========== */
.container {
    max-width: 1600px;
    margin: 0 auto;
    padding: 1.5rem;
}

/* ========== ✨ HEADER ========== */
.header {
    background: var(--bg-card);
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 1.2rem 2rem;
    margin-bottom: 2rem;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    animation: slideDown 0.6s ease-out;
    position: relative;
    overflow: hidden;
}

.header::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(124,58,237,0.1), transparent);
    animation: shimmer 3s infinite;
}

@keyframes shimmer { 100% { left: 100%; } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    animation: pulse 2s infinite, float 3s ease-in-out infinite;
    box-shadow: var(--shadow-neon);
}

@keyframes pulse {
    0%, 100% { box-shadow: var(--shadow-neon); }
    50% { box-shadow: 0 0 30px var(--primary-glow), 0 0 60px var(--secondary-glow); }
}
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

.logo h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem;
    font-weight: 900;
    background: linear-gradient(135deg, #fff, var(--secondary), var(--primary));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 1px;
}

/* ========== 📊 STATS PANEL ========== */
.stats-panel {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
    animation: slideUp 0.6s ease-out 0.1s both;
}

@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1rem 1.2rem;
    text-align: center;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
    cursor: default;
}

.stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    transform: scaleX(0);
    transition: transform 0.3s ease;
}

.stat-card:hover {
    transform: translateY(-4px);
    border-color: var(--border-hover);
    box-shadow: var(--shadow-card);
}
.stat-card:hover::after { transform: scaleX(1); }

.stat-icon {
    font-size: 1.5rem;
    margin-bottom: 0.4rem;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    display: block;
}

.stat-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* ========== 🔍 CONTROL BAR ========== */
.control-bar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 1rem 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 1rem;
    justify-content: space-between;
    animation: slideUp 0.6s ease-out 0.2s both;
}

.search-box {
    display: flex;
    align-items: center;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 0.4rem 1rem;
    transition: var(--transition);
    flex: 1;
    max-width: 400px;
}

.search-box:focus-within {
    border-color: var(--secondary);
    box-shadow: 0 0 0 3px var(--secondary-glow);
}

.search-box i { color: var(--text-muted); margin-right: 8px; }

.search-box input {
    background: transparent;
    border: none;
    color: var(--text);
    width: 100%;
    padding: 0.4rem 0;
    font-family: inherit;
    font-size: 0.95rem;
    outline: none;
}
.search-box input::placeholder { color: var(--text-muted); }

.search-box input:focus-visible {
    outline: 2px solid var(--secondary);
    outline-offset: 2px;
    border-radius: 14px;
}

.filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
}

.filter-chip {
    background: rgba(30, 40, 70, 0.6);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.4rem 1rem;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 6px;
}

.filter-chip:hover {
    background: rgba(50, 70, 120, 0.6);
    border-color: var(--secondary);
}

.filter-chip.active {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border: none;
    color: white;
    box-shadow: var(--shadow-neon);
    animation: chipActivate 0.3s ease;
}

.filter-chip:focus-visible {
    outline: 2px solid var(--secondary);
    outline-offset: 2px;
}

@keyframes chipActivate { 0% { transform: scale(0.95); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

/* ========== 🎴 PLATFORM SECTIONS ========== */
.platform-section {
    margin-bottom: 2.5rem;
    animation: fadeIn 0.5s ease-out both;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.2rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px dashed var(--border);
}

.section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
}

.section-title i {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.section-count {
    background: rgba(0,0,0,0.3);
    padding: 0.3rem 0.9rem;
    border-radius: 12px;
    font-size: 0.8rem;
    border: 1px solid var(--border);
}

/* ========== 🗂️ CARD GRID ========== */
.card-grid {
    grid-template-columns: repeat(auto-fill, minmax(min(320px, 100vw - 2rem), 1fr));
    gap: 1.2rem;
    display: grid;
}

.exec-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    transition: var(--transition);
    position: relative;
    animation: cardEnter 0.4s ease-out both;
}

@keyframes cardEnter { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

.exec-card:nth-child(1) { animation-delay: 0.05s; }
.exec-card:nth-child(2) { animation-delay: 0.1s; }
.exec-card:nth-child(3) { animation-delay: 0.15s; }
.exec-card:nth-child(4) { animation-delay: 0.2s; }

.exec-card:hover {
    transform: translateY(-6px) scale(1.01);
    border-color: var(--border-hover);
    box-shadow: var(--shadow-card), 0 0 30px rgba(124,58,237,0.15);
    z-index: 10;
}

.exec-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
    opacity: 0;
    transition: opacity 0.3s ease;
}
.exec-card:hover::before { opacity: 1; }

.card-content { padding: 1.3rem; }

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
    gap: 12px;
}

.executor-info {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
}

.executor-logo {
    width: 44px; height: 44px;
    border-radius: 12px;
    object-fit: contain;
    background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(6,182,212,0.2));
    padding: 4px;
    border: 1px solid var(--border);
    flex-shrink: 0;
    transition: var(--transition);
}

.exec-card:hover .executor-logo {
    transform: rotate(5deg) scale(1.05);
    border-color: var(--secondary);
}

.executor-logo-placeholder {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1.1rem;
    color: white;
    border: 1px solid var(--border);
}

.executor-name {
    font-weight: 700;
    font-size: 1.15rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.premium-badge {
    background: linear-gradient(135deg, var(--accent), #fbbf24);
    color: #000;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.2rem 0.6rem;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    animation: sparkle 2s infinite;
}

@keyframes sparkle { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; filter: brightness(1.2); } }

.status-badge {
    font-size: 0.7rem;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 5px;
}

.status-online {
    background: rgba(16, 185, 129, 0.15);
    color: var(--success);
    border: 1px solid var(--success);
}

.status-online::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--success);
    border-radius: 50%;
    animation: blink 1.5s infinite;
}

.status-offline {
    background: rgba(239, 68, 68, 0.15);
    color: var(--danger);
    border: 1px solid var(--danger);
}

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.version-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(0,0,0,0.3);
    padding: 0.3rem 0.7rem;
    border-radius: 10px;
    font-size: 0.75rem;
    font-family: monospace;
    margin: 0.5rem 0;
    border: 1px solid var(--border);
}

.action-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 1rem;
}

.btn {
    background: rgba(30, 40, 70, 0.8);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.45rem 1rem;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
}

.btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transition: left 0.4s ease;
}

.btn:hover::after { left: 100%; }

.btn:hover {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-color: transparent;
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(124,58,237,0.4);
}

.btn:focus-visible {
    outline: 2px solid var(--secondary);
    outline-offset: 2px;
}

.btn-download { color: var(--secondary); }
.btn-purchase { color: var(--accent); }
.btn-copy { color: var(--primary); }

.btn.copied {
    background: var(--success);
    border-color: var(--success);
    color: white;
}

.vng-section {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px dashed var(--border);
    font-size: 0.8rem;
}

.vng-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 0.5rem;
    color: var(--secondary);
    font-weight: 600;
}

/* ========== 📭 EMPTY STATE ========== */
.no-results {
    text-align: center;
    padding: 3rem 2rem;
    background: var(--bg-card);
    border: 1px dashed var(--border);
    border-radius: 24px;
    animation: fadeIn 0.4s ease;
}

.no-results i {
    font-size: 3rem;
    margin-bottom: 1rem;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: float 3s ease-in-out infinite;
}

#toast-container {
    position: fixed;
    bottom: max(2rem, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    width: min(90vw, 400px);
    max-width: 90vw;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}

.toast {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--success);
    border-radius: 16px;
    padding: 0.9rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s both;
    pointer-events: auto;
    backdrop-filter: blur(10px);
    box-shadow: var(--shadow-card);
}

.toast.error { border-left-color: var(--danger); }
.toast i { font-size: 1.1rem; }

@keyframes toastIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes toastOut { to { opacity: 0; transform: translateY(-10px) scale(0.95); } }

footer {
    text-align: center;
    padding: 2rem;
    margin-top: 3rem;
    border-top: 1px solid var(--border);
    font-size: 0.85rem;
    color: var(--text-muted);
    animation: fadeIn 0.6s ease 0.4s both;
}

footer a {
    color: var(--secondary);
    text-decoration: none;
    transition: var(--transition);
}

footer a:hover {
    color: var(--primary);
    text-shadow: 0 0 10px var(--primary-glow);
}

@media (max-width: 768px) {
    .container { padding: 1rem; }
    .header { padding: 1rem 1.5rem; flex-direction: column; text-align: center; }
    .logo h1 { font-size: 1.4rem; }
    .control-bar { flex-direction: column; align-items: stretch; }
    .search-box { max-width: 100%; }
    .filter-chips { justify-content: center; }
    .card-grid { grid-template-columns: 1fr; }
    .stat-card { padding: 0.8rem; }
    .stat-value { font-size: 1.5rem; }
}

@media (max-width: 360px) {
    .card-grid { grid-template-columns: 1fr; }
    .exec-card { min-width: unset; }
    .header { padding: 0.8rem 1rem; }
    .logo-icon { width: 40px; height: 40px; font-size: 1.2rem; }
    .logo h1 { font-size: 1.3rem; }
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 10px;
    border: 2px solid var(--bg-dark);
}
::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(135deg, var(--secondary), var(--primary));
}

::selection { background: var(--primary); color: white; }
</style>
</head>
<body>

<!-- Animated Background -->
<canvas id="bg-canvas"></canvas>
<div class="bg-gradient"></div>
<div class="bg-grid"></div>

<div class="container">
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-bolt" aria-hidden="true"></i></div>
            <h1>YANZ <span style="color:var(--secondary)"> EXECUTORS</span></h1>
        </div>
    </header>

<script>
class ParticleBG {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.particles = [];
        this.mouse = { x: null, y: null, radius: 150 };
        
        this.resize();
        this.init();
        this.animate();
        
        window.addEventListener('resize', () => this.resize(), { passive: true });
        window.addEventListener('mousemove', (e) => {
            this.mouse.x = e.x;
            this.mouse.y = e.y;
        }, { passive: true });
    }
    
    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
    }
    
    init() {
        const particleCount = Math.min(80, Math.floor(window.innerWidth / 20));
        for (let i = 0; i < particleCount; i++) {
            this.particles.push({
                x: Math.random() * this.canvas.width,
                y: Math.random() * this.canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2 + 1,
                color: `hsla(${Math.random() * 60 + 240}, 70%, 60%, ${Math.random() * 0.5 + 0.3})`
            });
        }
    }
    
    animate() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        this.particles.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;
            
            if (p.x < 0 || p.x > this.canvas.width) p.vx *= -1;
            if (p.y < 0 || p.y > this.canvas.height) p.vy *= -1;
            
            if (this.mouse.x) {
                const dx = p.x - this.mouse.x;
                const dy = p.y - this.mouse.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < this.mouse.radius) {
                    const force = (this.mouse.radius - dist) / this.mouse.radius;
                    p.vx += dx * force * 0.01;
                    p.vy += dy * force * 0.01;
                }
            }
            
            this.ctx.beginPath();
            this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            this.ctx.fillStyle = p.color;
            this.ctx.fill();
            
            for (let j = i + 1; j < this.particles.length; j++) {
                const p2 = this.particles[j];
                const dx = p.x - p2.x;
                const dy = p.y - p2.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 120) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(p.x, p.y);
                    this.ctx.lineTo(p2.x, p2.y);
                    this.ctx.strokeStyle = `rgba(100, 120, 180, ${0.15 * (1 - dist/120)})`;
                    this.ctx.lineWidth = 0.5;
                    this.ctx.stroke();
                }
            }
        });
        
        requestAnimationFrame(() => this.animate());
    }
}

const API_URL = "https://executors-one.vercel.app/executors";
const UPDATE_INTERVAL = 1000;

let fullData = null;
let activeFilter = "all";
let searchTerm = "";
let isFetching = false;
let streamInterval = null;

const canvas = document.getElementById('bg-canvas');
if (canvas) new ParticleBG(canvas);

function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
        const later = () => {
            clearTimeout(timeout);
            func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
    };
}

function handleImageError(img, initial) {
    try {
        const placeholder = document.createElement('div');
        placeholder.className = 'executor-logo-placeholder';
        placeholder.textContent = initial;
        placeholder.setAttribute('aria-label', `${initial} logo`);
        
        img.replaceWith(placeholder);
        
    } catch (e) {
        console.warn('Error handling image fallback:', e);
    }
}

function handleCopyCommand(btn) {
    const command = btn?.dataset?.command;
    if (command) {
        copyText(command, btn);
    }
}

function toast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    if (!container) return;
    
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.setAttribute('role', 'alert');
    toast.innerHTML = `
        <i class="fas fa-${type === 'error' ? 'exclamation-triangle' : 'check-circle'}" aria-hidden="true"></i>
        <span>${message}</span>
    `;
    container.appendChild(toast);
    
    setTimeout(() => {
        if (toast.parentNode) {
            toast.remove();
        }
    }, 2000);
}

async function copyText(text, btn) {
    try {
        await navigator.clipboard.writeText(text);
        const original = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check" aria-hidden="true"></i> Copied!';
        btn.classList.add('copied');
        btn.setAttribute('aria-label', 'Copied to clipboard');
        
        setTimeout(() => {
            btn.innerHTML = original;
            btn.classList.remove('copied');
            btn.setAttribute('aria-label', 'Copy command to clipboard');
        }, 1500);
        toast('Command copied! ✨');
    } catch {
        toast('Failed to copy', 'error');
    }
}

function getLogoHTML(exec) {
    const name = exec?.name || '?';
    const initial = String(name).charAt(0).toUpperCase();
    
    if (exec?.logo) {
        return `<img src="${exec.logo}" alt="${name} logo" class="executor-logo" 
            onerror="handleImageError(this, '${initial}')">`;
    }
    return `<div class="executor-logo-placeholder" aria-label="${name} logo">${initial}</div>`;
}

function renderStats() {
    if (!fullData) return;
    
    const platforms = ['Android', 'iOS', 'Windows', 'MacOS', 'External'];
    let total = 0, online = 0, offline = 0;
    
    platforms.forEach(plat => {
        const execs = fullData[plat] || [];
        total += execs.length;
        online += execs.filter(e => e.status === 'Online').length;
        offline += execs.filter(e => e.status !== 'Online').length;
    });
    
    const totalEl = document.getElementById('totalExec');
    const onlineEl = document.getElementById('onlineCount');
    const offlineEl = document.getElementById('offlineCount');
    
    if (totalEl) totalEl.textContent = total;
    if (onlineEl) onlineEl.textContent = online;
    if (offlineEl) offlineEl.textContent = offline;
}

function getFilteredData() {
    if (!fullData) return {};
    const result = {};
    const platforms = ['Android', 'iOS', 'Windows', 'MacOS', 'External'];
    
    for (const plat of platforms) {
        if (activeFilter !== 'all' && activeFilter !== plat) {
            result[plat] = [];
            continue;
        }
        let execs = fullData[plat] || [];
        if (searchTerm) {
            const term = searchTerm.toLowerCase();
            execs = execs.filter(e => e.name?.toLowerCase().includes(term));
        }
        result[plat] = execs;
    }
    return result;
}

function renderCards() {
    const container = document.getElementById('platformsContainer');
    if (!container) return;
    
    if (!fullData) {
        container.innerHTML = '<div class="no-results"><i class="fas fa-spinner fa-spin" aria-hidden="true"></i><p>Connecting to live stream...</p></div>';
        return;
    }
    
    const filtered = getFilteredData();
    const platforms = ['Android', 'iOS', 'Windows', 'MacOS', 'External'];
    const icons = {
        Android: '<i class="fab fa-android" aria-hidden="true"></i>',
        iOS: '<i class="fab fa-apple" aria-hidden="true"></i>',
        Windows: '<i class="fab fa-windows" aria-hidden="true"></i>',
        MacOS: '<i class="fas fa-desktop" aria-hidden="true"></i>',
        External: '<i class="fas fa-external-link-alt" aria-hidden="true"></i>'
    };
    
    let html = '';
    let hasResults = false;
    
    for (const plat of platforms) {
        const execs = filtered[plat];
        if (activeFilter !== 'all' && activeFilter !== plat) continue;
        if (!execs.length && activeFilter === 'all') continue;
        
        hasResults = true;
        const total = fullData[plat]?.length || 0;
        const online = fullData[plat]?.filter(e => e.status === 'Online').length || 0;
        
        html += `
        <div class="platform-section" data-platform="${plat}">
            <div class="section-header">
                <div class="section-title">
                    ${icons[plat]} ${plat}
                </div>
                <div class="section-count" aria-label="${execs.length} of ${total} executors, ${online} online">
                    ${execs.length}/${total} • 🟢 ${online}
                </div>
            </div>
            <div class="card-grid" role="list">`;
        
        for (const ex of execs) {
            const isOnline = ex.status === 'Online';
            const isPremium = ex.type === 'Premium' || ex.purchaseLink;
            const escapedCommand = (ex.installCommand || '').toString()
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            
            html += `
            <div class="exec-card" role="listitem">
                <div class="card-content">
                    <div class="card-header">
                        <div class="executor-info">
                            ${getLogoHTML(ex)}
                            <div>
                                <div class="executor-name">
                                    ${ex.name || '?'}
                                    ${isPremium ? '<span class="premium-badge" aria-label="Premium executor"><i class="fas fa-gem" aria-hidden="true"></i> Premium</span>' : ''}
                                </div>
                                <div class="version-tag"><i class="fas fa-code-branch" aria-hidden="true"></i> ${ex.version || 'N/A'}</div>
                            </div>
                        </div>
                        <div class="status-badge ${isOnline ? 'status-online' : 'status-offline'}" aria-label="Status: ${ex.status || 'Offline'}">
                            ${ex.status || 'Offline'}
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        ${ex.downloadLink ? `<a href="${ex.downloadLink}" target="_blank" rel="noopener noreferrer" class="btn btn-download"><i class="fas fa-download" aria-hidden="true"></i> Download</a>` : ''}
                        ${ex.purchaseLink ? `<a href="${ex.purchaseLink}" target="_blank" rel="noopener noreferrer" class="btn btn-purchase"><i class="fas fa-shopping-cart" aria-hidden="true"></i> Purchase</a>` : ''}
                        ${ex.installCommand ? `<button class="btn btn-copy" data-command="${escapedCommand}" onclick="handleCopyCommand(this)" aria-label="Copy install command"><i class="fas fa-terminal" aria-hidden="true"></i> Copy Cmd</button>` : ''}
                        ${!ex.downloadLink && !ex.purchaseLink && !ex.installCommand ? '<span class="btn" aria-label="No link available">No link</span>' : ''}
                    </div>
                    
                    ${plat === 'Android' && (ex.vngVersion || ex.vngDownloadLink) ? `
                    <div class="vng-section">
                        <div class="vng-header"><i class="fas fa-code-branch" aria-hidden="true"></i> VNG Version</div>
                        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                            <span>${ex.vngVersion || '?'}</span>
                            ${ex.vngStatus ? `<span class="status-badge ${ex.vngStatus==='Online'?'status-online':'status-offline'}">${ex.vngStatus}</span>` : ''}
                            ${ex.vngDownloadLink ? `<a href="${ex.vngDownloadLink}" target="_blank" rel="noopener noreferrer" class="btn btn-download" style="padding:0.25rem 0.6rem;font-size:0.75rem;"><i class="fas fa-download" aria-hidden="true"></i> VNG</a>` : ''}
                        </div>
                    </div>` : ''}
                </div>
            </div>`;
        }
        html += `</div></div>`;
    }
    
    if (!hasResults) {
        html = `<div class="no-results" role="status">
            <i class="fas fa-search" aria-hidden="true"></i>
            <p>No executors found matching "${searchTerm}"</p>
        </div>`;
    }
    
    container.innerHTML = html;
}

function updateCards() {
    if (!fullData) return;
    const filtered = getFilteredData();
    const platforms = ['Android', 'iOS', 'Windows', 'MacOS', 'External'];
    let offline = 0;
    platforms.forEach(plat => {
        const execs = fullData[plat] || [];
        offline += execs.filter(e => e.status !== 'Online').length;
    });
    const offlineEl = document.getElementById('offlineCount');
    if (offlineEl) offlineEl.textContent = offline;
    
    document.querySelectorAll('.section-count').forEach(el => {
        const plat = el.closest('.platform-section')?.dataset?.platform;
        if (plat && filtered[plat]) {
            const total = fullData[plat]?.length || 0;
            const online = fullData[plat]?.filter(e => e.status === 'Online').length || 0;
            el.textContent = `${filtered[plat].length}/${total} • 🟢 ${online}`;
            el.setAttribute('aria-label', `${filtered[plat].length} of ${total} executors, ${online} online`);
        }
    });
}

async function fetchWithRetry(url, options = {}, retries = 3, backoff = 1000) {
    for (let i = 0; i < retries; i++) {
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 7000);
            
            const res = await fetch(url, { ...options, signal: controller.signal });
            clearTimeout(timeout);
            
            if (!res.ok) {
                if (res.status >= 500 && i < retries - 1) {
                    await new Promise(r => setTimeout(r, backoff * Math.pow(2, i)));
                    continue;
                }
                throw new Error(`HTTP ${res.status}`);
            }
            
            const contentType = res.headers.get('content-type');
            if (!contentType || !contentType.includes('application/json')) {
                throw new Error('Invalid response format: expected JSON');
            }
            
            return await res.json();
        } catch (err) {
            if (err.name === 'AbortError') {
                throw new Error('Request timeout');
            }
            if (i === retries - 1) throw err;
            await new Promise(r => setTimeout(r, backoff * Math.pow(2, i)));
        }
    }
}

async function fetchData(showToast = false) {
    if (isFetching) return;
    isFetching = true;
    
    try {
        fullData = await fetchWithRetry(API_URL);
        renderStats();
        
        if (!document.querySelector('.exec-card')) {
            renderCards();
        } else {
            updateCards();
        }
        
        if (showToast) toast('Data refreshed ✨');
    } catch (err) {
        console.warn('Fetch error:', err);
        if (showToast) toast(`Connection error: ${err.message}`, 'error');
        
        const container = document.getElementById('platformsContainer');
        if (!fullData && container) {
            container.innerHTML = 
                `<div class="no-results" role="alert">
                    <i class="fas fa-wifi" aria-hidden="true"></i>
                    <p>Cannot connect to API<br><small>Retrying in ${UPDATE_INTERVAL/1000}s...</small></p>
                </div>`;
        }
    } finally {
        isFetching = false;
    }
}

function startStream() {
    fetchData(false);
    if (!streamInterval) {
        streamInterval = setInterval(() => fetchData(false), UPDATE_INTERVAL);
    }
}

function stopStream() {
    if (streamInterval) {
        clearInterval(streamInterval);
        streamInterval = null;
    }
}

function bindControls() {
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('input', debounce((e) => {
            searchTerm = e.target.value;
            renderCards();
        }, 300));
    }
    
    document.querySelectorAll('.filter-chip').forEach(chip => {
        const handleClick = () => {
            document.querySelectorAll('.filter-chip').forEach(c => {
                c.classList.remove('active');
                c.setAttribute('aria-checked', 'false');
            });
            chip.classList.add('active');
            chip.setAttribute('aria-checked', 'true');
            activeFilter = chip.dataset.filter;
            renderCards();
        };
        
        chip.addEventListener('click', handleClick);
        chip.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                handleClick();
            }
        });
    });
}

document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
        stopStream();
    } else if (!streamInterval) {
        startStream();
    }
});

window.addEventListener('beforeunload', () => {
    stopStream();
});

function init() {
    bindControls();
    startStream();
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
