<style>
/* ===== 🎨 CSS VARIABLES & RESET ===== */
:root {
    --bg-primary: #030712;
    --bg-secondary: #0f172a;
    --bg-tertiary: #1e293b;
    --glass-bg: rgba(30, 41, 59, 0.65);
    --glass-border: rgba(124, 58, 237, 0.3);
    --glass-highlight: rgba(167, 139, 250, 0.15);
    
    --text-primary: #f8fafc;
    --text-secondary: #cbd5e1;
    --text-muted: #94a3b8;
    
    --accent-primary: #8b5cf6;
    --accent-secondary: #38bdf8;
    --accent-gradient: linear-gradient(135deg, #8b5cf6, #38bdf8, #22d3ee);
    --accent-glow: 0 0 20px rgba(139, 92, 246, 0.5);
    
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    
    --card-radius: 1.5rem;
    --btn-radius: 2rem;
    --transition-fast: 150ms ease;
    --transition-normal: 300ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
    
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4), 0 2px 4px -1px rgba(0,0,0,0.3);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5), 0 4px 6px -2px rgba(0,0,0,0.4);
    --shadow-glow: 0 0 30px rgba(139, 92, 246, 0.3);
    
    --particle-color: rgba(139, 92, 246, 0.4);
}

*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

body {
    background: var(--bg-primary);
    font-family: 'Outfit', system-ui, -apple-system, sans-serif;
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

/* ===== 🌌 PARTICLE BACKGROUND ===== */
#particleCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    pointer-events: none;
}

.gradient-mesh {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(ellipse at 20% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(56, 189, 248, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(34, 211, 238, 0.08) 0%, transparent 70%);
    z-index: -1;
    animation: meshFloat 20s ease-in-out infinite;
}

@keyframes meshFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(2%, -2%) scale(1.02); }
    50% { transform: translate(-1%, 3%) scale(0.98); }
    75% { transform: translate(3%, 1%) scale(1.01); }
}

/* ===== 🌀 CUSTOM CURSOR ===== */
.custom-cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    border: 2px solid var(--accent-primary);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform var(--transition-fast), background var(--transition-fast);
    mix-blend-mode: difference;
}

.custom-cursor.hover {
    transform: translate(-50%, -50%) scale(1.5);
    background: rgba(139, 92, 246, 0.3);
    border-color: var(--accent-secondary);
}

.custom-cursor-dot {
    position: fixed;
    width: 6px;
    height: 6px;
    background: var(--accent-primary);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform var(--transition-fast);
}

/* ===== 📦 CONTAINER & LAYOUT ===== */
.container {
    max-width: 1600px;
    margin: 0 auto;
    padding: 1.5rem;
    position: relative;
    z-index: 1;
}

/* ===== 🔮 GLASS HEADER ===== */
.glass-header {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: var(--card-radius);
    padding: 1.2rem 2rem;
    margin-bottom: 2rem;
    border: 1px solid var(--glass-border);
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    box-shadow: var(--shadow-lg), var(--shadow-glow);
    animation: slideDown var(--transition-slow) ease-out;
    position: relative;
    overflow: hidden;
}

.glass-header::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
    animation: shimmer 3s infinite;
}

@keyframes shimmer {
    100% { left: 100%; }
}

@keyframes slideDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
}

.logo-area {
    display: flex;
    align-items: center;
    gap: 0.8rem;
}

.logo-area h1 {
    font-size: 1.9rem;
    font-weight: 800;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    background-size: 200% 200%;
    animation: gradientShift 4s ease infinite;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

@keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

.logo-area i {
    font-size: 1.5rem;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: pulseIcon 2s ease-in-out infinite;
}

@keyframes pulseIcon {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.8; }
}

/* ===== 🔴 LIVE BADGE ===== */
.live-stream-badge {
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid var(--danger);
    border-radius: 50px;
    padding: 0.4rem 1.2rem;
    font-weight: 700;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: pulseBadge 2s ease-in-out infinite;
    box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
}

@keyframes pulseBadge {
    0%, 100% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
    50% { box-shadow: 0 0 25px rgba(239, 68, 68, 0.6); }
}

.live-dot {
    width: 10px;
    height: 10px;
    background: var(--danger);
    border-radius: 50%;
    animation: pulseRed 1s ease-in-out infinite;
    box-shadow: 0 0 10px var(--danger);
}

@keyframes pulseRed {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(0.9); }
}

.timestamp-live {
    font-family: 'SF Mono', 'Monaco', monospace;
    background: rgba(0, 0, 0, 0.4);
    padding: 0.25rem 0.8rem;
    border-radius: 1rem;
    font-size: 0.85rem;
    letter-spacing: 1px;
    border: 1px solid rgba(255,255,255,0.1);
}

/* ===== 📊 STATS PANEL ===== */
.stats-panel {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
    animation: fadeInUp var(--transition-slow) 0.2s ease-out both;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.stat-tile {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    border-radius: 1.25rem;
    padding: 1rem;
    text-align: center;
    border: 1px solid var(--glass-border);
    transition: var(--transition-normal);
    position: relative;
    overflow: hidden;
    cursor: default;
}

.stat-tile::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--accent-gradient);
    opacity: 0;
    transition: var(--transition-fast);
}

.stat-tile:hover {
    transform: translateY(-4px);
    border-color: var(--accent-primary);
    box-shadow: var(--shadow-lg);
}

.stat-tile:hover::before {
    opacity: 1;
}

.stat-icon {
    font-size: 1.4rem;
    margin-bottom: 0.4rem;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.stat-number {
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 0.2rem;
    background: linear-gradient(135deg, #fff, #cbd5e1);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.stat-online { color: var(--success); }
.stat-offline { color: var(--danger); }

/* ===== ⚙️ CONTROL BAR ===== */
.control-bar {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    border-radius: var(--btn-radius);
    padding: 0.8rem 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 1rem;
    justify-content: space-between;
    border: 1px solid var(--glass-border);
    animation: fadeInUp var(--transition-slow) 0.3s ease-out both;
}

.search-wrapper {
    background: var(--bg-secondary);
    border-radius: var(--btn-radius);
    padding: 0.3rem 1.2rem;
    border: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    gap: 0.6rem;
    transition: var(--transition-fast);
    flex: 1;
    max-width: 400px;
    position: relative;
}

.search-wrapper:focus-within {
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
}

.search-wrapper i {
    color: var(--text-muted);
    transition: var(--transition-fast);
}

.search-wrapper:focus-within i {
    color: var(--accent-primary);
}

#globalSearch {
    background: transparent;
    border: none;
    padding: 0.5rem 0;
    color: var(--text-primary);
    width: 100%;
    outline: none;
    font-size: 0.95rem;
    font-family: inherit;
}

#globalSearch::placeholder {
    color: var(--text-muted);
    opacity: 0.7;
}

.filter-group {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
}

.filter-chip {
    background: var(--bg-tertiary);
    border-radius: var(--btn-radius);
    padding: 0.4rem 1.1rem;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: var(--transition-normal);
    display: flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--text-secondary);
    position: relative;
    overflow: hidden;
}

.filter-chip::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--accent-gradient);
    opacity: 0;
    transition: var(--transition-fast);
    z-index: -1;
}

.filter-chip:hover {
    transform: translateY(-2px);
    color: var(--text-primary);
    border-color: var(--accent-primary);
}

.filter-chip:hover::before {
    opacity: 0.1;
}

.filter-chip.active {
    background: var(--accent-primary);
    color: white;
    border-color: var(--accent-secondary);
    box-shadow: var(--accent-glow);
}

.filter-chip.active::before {
    opacity: 0.2;
}

/* ===== 🗂️ PLATFORM SECTIONS ===== */
.platform-section {
    margin-bottom: 2.5rem;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeInUp var(--transition-slow) 0.4s ease-out forwards;
}

.platform-section:nth-child(2) { animation-delay: 0.1s; }
.platform-section:nth-child(3) { animation-delay: 0.2s; }
.platform-section:nth-child(4) { animation-delay: 0.3s; }
.platform-section:nth-child(5) { animation-delay: 0.4s; }
.platform-section:nth-child(6) { animation-delay: 0.5s; }

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.2rem;
    padding: 0 0.5rem;
}

.section-header strong {
    font-size: 1.3rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.section-header i {
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.platform-count {
    background: var(--bg-tertiary);
    border-radius: 1rem;
    padding: 0.35rem 0.9rem;
    font-size: 0.8rem;
    font-weight: 600;
    border: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

/* ===== 🃏 CARD GRID ===== */
.card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 1.3rem;
}

/* ===== 🎴 EXECUTOR CARD ===== */
.exec-card {
    background: linear-gradient(145deg, var(--bg-secondary), var(--bg-tertiary));
    border-radius: var(--card-radius);
    border: 1px solid var(--glass-border);
    transition: var(--transition-normal);
    position: relative;
    overflow: hidden;
    transform-style: preserve-3d;
    perspective: 1000px;
    opacity: 0;
    transform: translateY(20px);
    animation: cardReveal var(--transition-slow) 0.3s ease-out forwards;
}

.exec-card:nth-child(1) { animation-delay: 0.1s; }
.exec-card:nth-child(2) { animation-delay: 0.15s; }
.exec-card:nth-child(3) { animation-delay: 0.2s; }
.exec-card:nth-child(4) { animation-delay: 0.25s; }
.exec-card:nth-child(5) { animation-delay: 0.3s; }
.exec-card:nth-child(6) { animation-delay: 0.35s; }

@keyframes cardReveal {
    to { opacity: 1; transform: translateY(0); }
}

.exec-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
    transition: left 0.5s ease;
    pointer-events: none;
}

.exec-card:hover::before {
    left: 100%;
}

.exec-card:hover {
    transform: translateY(-6px) scale(1.02);
    border-color: var(--accent-primary);
    box-shadow: var(--shadow-lg), var(--accent-glow);
    z-index: 10;
}

.exec-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary), transparent);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: var(--transition-fast);
    pointer-events: none;
}

.exec-card:hover::after {
    opacity: 1;
}

.card-inner {
    padding: 1.3rem;
    position: relative;
    z-index: 1;
}

.card-title-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.8rem;
    gap: 0.8rem;
}

.exec-name {
    font-size: 1.2rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    flex-wrap: wrap;
    line-height: 1.3;
}

/* Logo Styles */
.executor-logo-container {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(56, 189, 248, 0.2));
    border: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition-fast);
}

.exec-card:hover .executor-logo-container {
    transform: scale(1.1) rotate(2deg);
    border-color: var(--accent-primary);
    box-shadow: var(--accent-glow);
}

.executor-logo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 4px;
    transition: var(--transition-fast);
}

.executor-logo-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    font-weight: 800;
    color: white;
    background: var(--accent-gradient);
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

/* Premium Badge */
.premium-badge {
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(234, 179, 8, 0.2));
    color: #fbbf24;
    font-size: 0.65rem;
    padding: 0.25rem 0.6rem;
    border-radius: 1rem;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-weight: 700;
    border: 1px solid rgba(245, 158, 11, 0.4);
    animation: pulseGold 2s ease-in-out infinite;
}

@keyframes pulseGold {
    0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
    50% { box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
}

/* Status Chip */
.status-chip {
    font-size: 0.7rem;
    padding: 0.3rem 0.8rem;
    border-radius: 2rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: var(--transition-fast);
}

.status-online {
    background: rgba(16, 185, 129, 0.15);
    color: var(--success);
    border: 1px solid var(--success);
    animation: pulseGreen 2s ease-in-out infinite;
}

.status-offline {
    background: rgba(239, 68, 68, 0.15);
    color: var(--danger);
    border: 1px solid var(--danger);
}

@keyframes pulseGreen {
    0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
    50% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
}

/* Version Text */
.version-text {
    font-family: 'SF Mono', 'Monaco', monospace;
    background: rgba(0, 0, 0, 0.3);
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 0.25rem 0.7rem;
    border-radius: 1rem;
    font-size: 0.75rem;
    margin: 0.6rem 0;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-secondary);
}

/* Action Buttons */
.action-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 1rem;
}

.btn-icon {
    background: var(--bg-tertiary);
    border-radius: var(--btn-radius);
    padding: 0.4rem 1rem;
    font-size: 0.75rem;
    font-weight: 600;
    text-decoration: none;
    color: var(--text-secondary);
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border: 1px solid var(--glass-border);
    cursor: pointer;
    transition: var(--transition-normal);
    position: relative;
    overflow: hidden;
}

.btn-icon::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--accent-gradient);
    opacity: 0;
    transition: var(--transition-fast);
    z-index: -1;
}

.btn-icon:hover {
    color: white;
    border-color: var(--accent-primary);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.btn-icon:hover::before {
    opacity: 0.15;
}

.btn-icon:active {
    transform: translateY(0);
}

.btn-icon.download { color: var(--success); border-color: var(--success); }
.btn-icon.download:hover { background: rgba(16, 185, 129, 0.2); }

.btn-icon.purchase { color: var(--warning); border-color: var(--warning); }

.btn-icon.copy { color: var(--accent-secondary); border-color: var(--accent-secondary); }
.btn-icon.copy:hover { background: rgba(56, 189, 248, 0.2); }

/* VNG Details */
.vng-details {
    margin-top: 12px;

    font-size: 0.75rem;
    color: var(--text-muted);

    to { opacity: 1; }
}

/* ===== ❌ NO RESULTS ===== */
.no-results {
    text-align: center;
    padding: 3rem 2rem;
    background: var(--glass-bg);
    border-radius: var(--card-radius);
    border: 1px dashed var(--glass-border);

    color: transparent;
    animation: bounce 2s ease-in-out infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* ===== 🦶 FOOTER ===== */
footer {
    text-align: center;
    margin-top: 3rem;
    padding: 1.5rem;
    font-size: 0.8rem;
    opacity: 0.8;

}

    transition: var(--transition-fast);
}

footer a:hover {
    color: var(--accent-primary);
    text-decoration: underline;
}

/* ===== 🔔 TOAST NOTIFICATIONS ===== */
.toast-container {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10000;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    pointer-events: none;
}

.toast {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border-radius: 1rem;
    padding: 0.9rem 1.5rem;
    font-size: 0.9rem;
    font-weight: 500;
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow-lg);
    animation: toastSlide var(--transition-normal) ease-out, toastPulse 3s ease-in-out infinite;
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    max-width: 350px;
}

.toast.success {
    border-color: var(--success);
    color: var(--success);
}

.toast.error {
    border-color: var(--danger);
    color: var(--danger);
}

@keyframes toastSlide {
    from { 
        opacity: 0; 
        transform: translateX(-50%) translateY(30px) scale(0.95); 
    }
    to { 
        opacity: 1; 
        transform: translateX(-50%) translateY(0) scale(1); 
    }
}

@keyframes toastPulse {
    0%, 100% { box-shadow: var(--shadow-lg); }
    50% { box-shadow: var(--shadow-lg), 0 0 20px rgba(139, 92, 246, 0.3); }
}

/* ===== ⏳ SKELETON LOADER ===== */
.skeleton {
    background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-secondary) 50%, var(--bg-tertiary) 75%);
    background-size: 200% 100%;
    animation: skeletonLoad 1.5s ease-in-out infinite;
    border-radius: 0.5rem;
}

@keyframes skeletonLoad {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

.skeleton-card {
    height: 200px;
    border-radius: var(--card-radius);
    margin-bottom: 1rem;
}

/* ===== 📱 RESPONSIVE ===== */
@media (max-width: 768px) {
    .container { padding: 1rem; }

/* ===== 🎯 ACCESSIBILITY ===== */
@media (prefers-reduced-motion: reduce) {

/* Focus styles for keyboard navigation */

<script>
/**
 * 🚀 YANZ EXECUTORS - Next-Gen Hub
 * Ultra Modern Design + Animations + Performance
 */

// ===== ⚙️ CONFIG =====
const CONFIG = {
    API_URL: "https://executors-one.vercel.app/executors",
    UPDATE_INTERVAL_MS: 1000,
    DEBOUNCE_DELAY: 200,
    PARTICLE_COUNT: 60,
    PARTICLE_SPEED: 0.3,
    TILT_MAX_ROTATION: 10,
    CURSOR_SMOOTHNESS: 0.15
};

// ===== 🧠 STATE =====
let state = {
    fullData: null,
    activePlatform: "all",
    searchTerm: "",
    isFetching: false,
    lastSuccessTime: null,
    updateIntervalId: null,
    cursor: { x: 0, y: 0, targetX: 0, targetY: 0 }
};

// ===== 🎨 DOM CACHE =====
const DOM = {
    statsDiv: document.getElementById("statsPanel"),
    platformsContainer: document.getElementById("platformsContainer"),
    searchInput: document.getElementById("globalSearch"),
    liveTimestamp: document.getElementById("liveTimestamp"),
    toastContainer: document.getElementById("toastContainer"),
    connectionStatus: document.getElementById("connectionStatus"),
    particleCanvas: document.getElementById("particleCanvas"),
    cursor: document.querySelector('.custom-cursor'),
    cursorDot: document.querySelector('.custom-cursor-dot')
};

// ===== 🎨 PARTICLE SYSTEM =====
class ParticleSystem {
    constructor(canvas, config) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.config = config;
        this.particles = [];
        this.mouse = { x: null, y: null, radius: 150 };
        
        this.resize();
        this.init();
        this.animate();
        
        window.addEventListener('resize', () => this.resize());
        document.addEventListener('mousemove', (e) => {
            this.mouse.x = e.x;
            this.mouse.y = e.y;
        });
    }
    
    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
    }
    
    init() {
        for (let i = 0; i < this.config.PARTICLE_COUNT; i++) {
            this.particles.push({
                x: Math.random() * this.canvas.width,
                y: Math.random() * this.canvas.height,
                size: Math.random() * 2 + 1,
                speedX: (Math.random() - 0.5) * this.config.PARTICLE_SPEED,
                speedY: (Math.random() - 0.5) * this.config.PARTICLE_SPEED,
                opacity: Math.random() * 0.5 + 0.2
            });
        }
    }
    
    animate() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        this.particles.forEach((p, i) => {
            // Move
            p.x += p.speedX;
            p.y += p.speedY;
            
            // Bounce
            if (p.x < 0 || p.x > this.canvas.width) p.speedX *= -1;
            if (p.y < 0 || p.y > this.canvas.height) p.speedY *= -1;
            
            // Mouse interaction
            if (this.mouse.x && this.mouse.y) {
                const dx = p.x - this.mouse.x;
                const dy = p.y - this.mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < this.mouse.radius) {
                    const force = (this.mouse.radius - dist) / this.mouse.radius;
                    p.x += dx * force * 0.02;
                    p.y += dy * force * 0.02;
                }
            }
            
            // Draw
            this.ctx.beginPath();
            this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            this.ctx.fillStyle = `rgba(139, 92, 246, ${p.opacity})`;
            this.ctx.fill();
            
            // Connect nearby particles
            for (let j = i + 1; j < this.particles.length; j++) {
                const p2 = this.particles[j];
                const dx = p.x - p2.x;
                const dy = p.y - p2.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 120) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(p.x, p.y);
                    this.ctx.lineTo(p2.x, p2.y);
                    this.ctx.strokeStyle = `rgba(139, 92, 246, ${0.1 * (1 - dist/120)})`;
                    this.ctx.lineWidth = 0.5;
                    this.ctx.stroke();
                }
            }
        });
        
        requestAnimationFrame(() => this.animate());
    }
}

// ===== 🖱️ CUSTOM CURSOR =====
class CustomCursor {
    constructor(config) {
        this.config = config;
        this.cursor = DOM.cursor;
        this.cursorDot = DOM.cursorDot;
        this.init();
    }
    
    init() {
        document.addEventListener('mousemove', (e) => {
            state.cursor.targetX = e.clientX;
            state.cursor.targetY = e.clientY;
        });
        
        // Hover effects
        const interactive = 'a, button, .filter-chip, .exec-card, input, [role="button"]';
        document.addEventListener('mouseover', (e) => {
            if (e.target.closest(interactive)) {
                this.cursor.classList.add('hover');
            }
        });
        document.addEventListener('mouseout', (e) => {
            if (e.target.closest(interactive)) {
                this.cursor.classList.remove('hover');
            }
        });
        
        // Animation loop
        this.animate();
    }
    
    animate() {
        // Smooth follow
        state.cursor.x += (state.cursor.targetX - state.cursor.x) * CONFIG.CURSOR_SMOOTHNESS;
        state.cursor.y += (state.cursor.targetY - state.cursor.y) * CONFIG.CURSOR_SMOOTHNESS;
        
        this.cursor.style.transform = `translate(${state.cursor.x}px, ${state.cursor.y}px) translate(-50%, -50%)`;
        this.cursorDot.style.transform = `translate(${state.cursor.targetX}px, ${state.cursor.targetY}px) translate(-50%, -50%)`;
        
        requestAnimationFrame(() => this.animate());
    }
}

// ===== 🎴 3D TILT EFFECT =====
class TiltEffect {
    static init(cards) {
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = ((y - centerY) / centerY) * -CONFIG.TILT_MAX_ROTATION;
                const rotateY = ((x - centerX) / centerX) * CONFIG.TILT_MAX_ROTATION;
                
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02) translateY(-6px)`;
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1) translateY(0)';
            });
        });
    }
}

// ===== 🔔 TOAST SYSTEM =====
function showToast(message, type = 'success', duration = 2500) {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `
        <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
        <span>${message}</span>
    `;
    
    DOM.toastContainer.appendChild(toast);
    
    setTimeout(() => {
        toast.style.animation = 'toastSlide 0.3s ease-in reverse, toastPulse 3s ease-in-out infinite';
        setTimeout(() => toast.remove(), 300);
    }, duration);
}

// ===== 📋 CLIPBOARD =====
async function copyToClipboard(text, btn) {
    try {
        await navigator.clipboard.writeText(text);
        const original = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        showToast('Command copied to clipboard!', 'success', 1500);
        setTimeout(() => { if(btn) btn.innerHTML = original; }, 1200);
    } catch(e) { 
        showToast("Failed to copy", "error"); 
    }
}

// ===== 🕐 LIVE CLOCK =====
function updateLiveClock() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-GB', { hour12: false });
    DOM.liveTimestamp.innerText = timeStr;
}
setInterval(updateLiveClock, 1000);
updateLiveClock();

// ===== 🎨 LOGO HANDLER =====
const logoCache = new Map();
const failedLogos = new Set();

function getLogoHtml(executor) {
    const cacheKey = `${executor.name}`;
    
    if (executor.logo && !failedLogos.has(executor.logo)) {
        if (!logoCache.has(cacheKey)) {
            logoCache.set(cacheKey, executor.logo);
        }
        return `<div class="executor-logo-container">
                    <img src="${escapeHtml(executor.logo)}" 
                         alt="${escapeHtml(executor.name)}" 
                         class="executor-logo"
                         loading="lazy"
                         onerror="handleLogoError(this, '${escapeHtml(executor.name)}')" />
                </div>`;
    }
    
    const initial = (executor.name || '?').charAt(0).toUpperCase();
    return `<div class="executor-logo-container">
                <div class="executor-logo-placeholder">${initial}</div>
            </div>`;
}

window.handleLogoError = function(imgElement, executorName) {
    const logoUrl = imgElement.src;
    failedLogos.add(logoUrl);
    
    const container = imgElement.parentElement;
    if (container) {
        const initial = (executorName || '?').charAt(0).toUpperCase();
        container.innerHTML = `<div class="executor-logo-placeholder">${initial}</div>`;
    }
};

// ===== 🔤 HTML ESCAPE =====
function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ===== 📊 STATS RENDERER =====
function renderStats() {
    if (!state.fullData) return;
    
    const platforms = ["Android", "iOS", "Windows", "MacOS", "External"];
    const icons = {
        Android: '<i class="fab fa-android"></i>',
        iOS: '<i class="fab fa-apple"></i>',
        Windows: '<i class="fab fa-windows"></i>',
        MacOS: '<i class="fas fa-desktop"></i>',
        External: '<i class="fas fa-external-link-alt"></i>'
    };
    
    let html = '';
    
    platforms.forEach(plat => {
        const execs = state.fullData[plat] || [];
        const total = execs.length;
        const online = execs.filter(e => e.status === "Online").length;
        
        html += `
            <div class="stat-tile">
                <div class="stat-icon">${icons[plat]}</div>
                <div class="stat-number">${total}</div>
                <div class="stat-label">${plat}</div>
                <div style="margin-top: 4px; font-size: 0.7rem;">
                    <span class="stat-online">🟢 ${online}</span>
                    <span style="color: var(--text-muted)">/ ${total}</span>
                </div>
            </div>
        `;
    });
    
    // Total stats
    const allExecs = Object.values(state.fullData).flat();
    const totalAll = allExecs.length;
    const onlineAll = allExecs.filter(e => e.status === "Online").length;
    
    html += `
        <div class="stat-tile" style="grid-column: span 2;">
            <div class="stat-icon"><i class="fas fa-layer-group"></i></div>
            <div class="stat-number">${onlineAll}</div>
            <div class="stat-label">Total Online</div>
            <div style="margin-top: 4px; font-size: 0.7rem; color: var(--text-muted)">
                of ${totalAll} executors
            </div>
        </div>
    `;
    
    DOM.statsDiv.innerHTML = html;
}

// ===== 🃏 CARD RENDERER =====
function getFilteredData() {
    if (!state.fullData) return {};
    const platforms = ["Android", "iOS", "Windows", "MacOS", "External"];
    let result = {};
    
    for (let plat of platforms) {
        if (state.activePlatform !== "all" && state.activePlatform !== plat) {
            result[plat] = [];
            continue;
        }
        let execs = state.fullData[plat] || [];
        if (state.searchTerm.trim() !== "") {
            const term = state.searchTerm.toLowerCase();
            execs = execs.filter(ex => ex.name && ex.name.toLowerCase().includes(term));
        }
        result[plat] = execs;
    }
    return result;
}

function renderCards() {
    if (!state.fullData) {
        DOM.platformsContainer.innerHTML = `
            <div class="no-results">
                <i class="fas fa-spinner fa-spin"></i>
                <p style="margin-top: 1rem;">Loading live data...</p>
            </div>`;
        return;
    }
    
    const filteredData = getFilteredData();
    const platforms = ["Android", "iOS", "Windows", "MacOS", "External"];
    const icons = {
        Android: '<i class="fab fa-android"></i>',
        iOS: '<i class="fab fa-apple"></i>',
        Windows: '<i class="fab fa-windows"></i>',
        MacOS: '<i class="fas fa-desktop"></i>',
        External: '<i class="fas fa-external-link-alt"></i>'
    };
    
    let html = '';
    let anyVisible = false;
    
    platforms.forEach(plat => {
        const execs = filteredData[plat];
        if (state.activePlatform !== "all" && state.activePlatform !== plat) return;
        if (execs.length === 0 && state.activePlatform === "all") return;
        
        anyVisible = true;
        const totalOriginal = state.fullData[plat]?.length || 0;
        const onlineOriginal = state.fullData[plat]?.filter(ex => ex.status === "Online").length || 0;
        
        html += `
            <div class="platform-section" data-platform="${plat}">
                <div class="section-header">
                    <div>${icons[plat]} <strong>${plat}</strong></div>
                    <div class="platform-count">
                        <span style="color: var(--accent-secondary)">${execs.length}</span>
                        <span style="opacity: 0.6">/</span>
                        <span>${totalOriginal}</span>
                        <span style="margin: 0 0.5rem; opacity: 0.4">|</span>
                        <span class="stat-online">🟢 ${onlineOriginal}</span>
                    </div>
                </div>
                <div class="card-grid">
        `;
        
        execs.forEach(ex => {
            const key = `${plat}-${ex.name}`;
            const isOnline = ex.status === "Online";
            const premiumFlag = ex.type === "Premium" || ex.purchaseLink;
            
            html += `
                <div class="exec-card" data-executor-key="${escapeHtml(key)}">
                    <div class="card-inner">
                        <div class="card-title-row">
                            <div class="exec-name">
                                ${getLogoHtml(ex)}
                                <span>${escapeHtml(ex.name || '?')}</span>
                                ${premiumFlag ? '<span class="premium-badge"><i class="fas fa-gem"></i> Premium</span>' : ''}
                            </div>
                            <div class="status-chip ${isOnline ? 'status-online' : 'status-offline'}">
                                ${isOnline ? '<i class="fas fa-circle" style="font-size: 0.5rem;"></i> ' : ''}
                                ${ex.status || 'Offline'}
                            </div>
                        </div>
                        <div class="version-text">
                            <i class="fas fa-code-branch"></i> 
                            ${escapeHtml(ex.version || 'N/A')}
                        </div>
                        <div class="action-buttons">
            `;
            
            if (ex.downloadLink) {
                html += `<a href="${escapeHtml(ex.downloadLink)}" target="_blank" class="btn-icon download">
                    <i class="fas fa-download"></i> Download
                </a>`;
            }
            if (ex.purchaseLink) {
                html += `<a href="${escapeHtml(ex.purchaseLink)}" target="_blank" class="btn-icon purchase">
                    <i class="fas fa-shopping-cart"></i> Purchase
                </a>`;
            }
            if (ex.installCommand) {
                html += `<button class="btn-icon copy" data-cmd="${escapeHtml(ex.installCommand)}">
                    <i class="fas fa-terminal"></i> Copy Cmd
                </button>`;
            }
            if (!ex.downloadLink && !ex.purchaseLink && !ex.installCommand) {
                html += `<span class="btn-icon"><i class="fas fa-link-slash"></i> No link</span>`;
            }
            
            html += `</div>`;
            
            // VNG Section for Android
            if (plat === "Android" && (ex.vngVersion || ex.vngStatus || ex.vngDownloadLink)) {
                html += `
                    <div class="vng-details">
                        <strong style="color: var(--accent-secondary)">VNG:</strong> 
                        ${escapeHtml(ex.vngVersion || '?')}
                        ${ex.vngStatus ? ` 
                            <span class="status-chip ${ex.vngStatus === 'Online' ? 'status-online' : 'status-offline'}" 
                                  style="margin-left: 5px; font-size: 0.65rem;">
                                ${ex.vngStatus}
                            </span>` : ''}
                        ${ex.vngDownloadLink ? `
                            <div style="margin-top: 6px;">
                                <a href="${escapeHtml(ex.vngDownloadLink)}" target="_blank" 
                                   class="btn-icon download" style="padding: 0.25rem 0.7rem; font-size: 0.7rem;">
                                    <i class="fas fa-download"></i> VNG
                                </a>
                            </div>` : ''}
                    </div>
                `;
            }
            
            html += `</div></div>`;
        });
        
        html += `</div></div>`;
    });
    
    if (!anyVisible) {
        html = `
            <div class="no-results">
                <i class="fas fa-search"></i>
                <p style="margin-top: 1rem;">
                    ${state.activePlatform !== "all" 
                        ? `No results for "${state.activePlatform}"` 
                        : state.searchTerm 
                            ? `No results for "${state.searchTerm}"` 
                            : 'No executor data available'}
                </p>
            </div>
        `;
    }
    
    DOM.platformsContainer.innerHTML = html;
    
    // Re-initialize interactive elements
    initInteractiveElements();
    
    // Apply tilt effect to new cards
    const newCards = document.querySelectorAll('.exec-card');
    TiltEffect.init(Array.from(newCards));
}

// ===== 🔄 UPDATE EXISTING CARDS (Performance) =====
function updateExistingCards() {
    if (!state.fullData) return;
    const filteredData = getFilteredData();
    
    // Update platform counts
    document.querySelectorAll('[data-platform-count]').forEach(el => {
        const plat = el.closest('.platform-section')?.dataset?.platform;
        if (plat && filteredData[plat]) {
            const execs = filteredData[plat];
            const totalOriginal = state.fullData[plat]?.length || 0;
            const onlineOriginal = state.fullData[plat]?.filter(ex => ex.status === "Online").length || 0;
            el.innerHTML = `
                <span style="color: var(--accent-secondary)">${execs.length}</span>
                <span style="opacity: 0.6">/</span>
                <span>${totalOriginal}</span>
                <span style="margin: 0 0.5rem; opacity: 0.4">|</span>
                <span class="stat-online">🟢 ${onlineOriginal}</span>
            `;
        }
    });
    
    // Update individual cards
    document.querySelectorAll('.exec-card').forEach(card => {
        const key = card.dataset.executorKey;
        if (!key) return;
        
        for (const plat of ["Android", "iOS", "Windows", "MacOS", "External"]) {
            const execs = filteredData[plat] || [];
            const executor = execs.find(ex => `${plat}-${ex.name}` === key);
            if (executor) {
                // Update status
                const statusChip = card.querySelector('.status-chip');
                if (statusChip) {
                    const isOnline = executor.status === "Online";
                    statusChip.className = `status-chip ${isOnline ? 'status-online' : 'status-offline'}`;
                    statusChip.innerHTML = `${isOnline ? '<i class="fas fa-circle" style="font-size: 0.5rem;"></i> ' : ''}${executor.status || 'Offline'}`;
                }
                
                // Update version
                const versionEl = card.querySelector('.version-text');
                if (versionEl) {
                    versionEl.innerHTML = `<i class="fas fa-code-branch"></i> ${escapeHtml(executor.version || 'N/A')}`;
                }
                break;
            }
        }
    });
}

// ===== 🌐 FETCH DATA =====
async function fetchLiveData(showToastMsg = false) {
    if (state.isFetching) return;
    state.isFetching = true;
    
    try {
        const timeout = new Promise((_, reject) =>
            setTimeout(() => reject(new Error("Request timed out")), 7000)
        );
        
        const response = await Promise.race([fetch(CONFIG.API_URL), timeout]);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const data = await response.json();
        state.fullData = data;
        state.lastSuccessTime = Date.now();
        
        // Update connection status
        DOM.connectionStatus.innerHTML = '🟢 Connected';
        DOM.connectionStatus.style.color = 'var(--success)';
        
        // Initial render or update
        if (!DOM.platformsContainer.querySelector('.exec-card')) {
            renderCards();
        } else {
            updateExistingCards();
        }
        
        renderStats();
        
        if (showToastMsg) showToast("✨ Live data refreshed", "success", 1200);
        
    } catch (err) {
        console.warn("Fetch error:", err);
        DOM.connectionStatus.innerHTML = '🔴 Disconnected';
        DOM.connectionStatus.style.color = 'var(--danger)';
        
        if (showToastMsg) showToast(`API error: ${err.message}`, "error");
        
        if (!state.fullData) {
            DOM.platformsContainer.innerHTML = `
                <div class="no-results">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p style="margin-top: 1rem;">Cannot reach API<br><small>${err.message}</small></p>
                    <p style="margin-top: 0.5rem; font-size: 0.8rem; opacity: 0.7">Retrying every 1s...</p>
                </div>
            `;
        }
    } finally {
        state.isFetching = false;
    }
}

// ===== 🔄 LIVE STREAM =====
function startLiveStream() {
    if (state.updateIntervalId) clearInterval(state.updateIntervalId);
    fetchLiveData(false);
    state.updateIntervalId = setInterval(() => {
        fetchLiveData(false);
    }, CONFIG.UPDATE_INTERVAL_MS);
}

// ===== 🎮 INTERACTIVE ELEMENTS =====
function initInteractiveElements() {
    // Copy command buttons
    document.querySelectorAll('.btn-icon.copy').forEach(btn => {
        const cmd = btn.dataset.cmd;
        if (cmd) {
            btn.onclick = (e) => {
                e.stopPropagation();
                copyToClipboard(cmd, btn);
            };
        }
    });
    
    // Search with debounce
    let searchTimeout;
    DOM.searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            state.searchTerm = e.target.value;
            renderCards();
        }, CONFIG.DEBOUNCE_DELAY);
    });
    
    // Filter chips
    document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            state.activePlatform = chip.dataset.filter;
            renderCards();
            showToast(`Filter: ${chip.textContent.trim()}`, "success", 1000);
        });
    });
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.key === '/' && document.activeElement !== DOM.searchInput) {
            e.preventDefault();
            DOM.searchInput.focus();
        }
        if (e.key === 'Escape') {
            DOM.searchInput.blur();
            state.searchTerm = '';
            DOM.searchInput.value = '';
            renderCards();
        }
    });
}

// ===== 🚀 INIT =====
function init() {
    // Initialize visual effects
    new ParticleSystem(DOM.particleCanvas, CONFIG);
    new CustomCursor(CONFIG);
    
    // Initialize interactivity
    initInteractiveElements();
    
    // Start live data stream
    startLiveStream();
    
    // Handle visibility change (pause when tab inactive)
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            if (state.updateIntervalId) {
                clearInterval(state.updateIntervalId);
                state.updateIntervalId = null;
            }
        } else {
            startLiveStream();
        }
    });
    
    console.log('✨ YANZ EXECUTORS - Next-Gen Hub Loaded');
}

// Start when DOM is ready
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
</body>
</html>
