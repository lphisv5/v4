        .logo { position: fixed; bottom: 12px; right: 16px; color: rgba(90, 181, 246, 0.48); font-size: 13px; font-weight: 500; z-index: 5; letter-spacing: 1.3px; transition: opacity 0.48s ease, transform 0.3s ease; text-shadow: 0 0 9px rgba(90, 181, 246, 0.32); cursor: pointer; }
        .logo:hover { color: rgba(100, 191, 255, 0.72); transform: scale(1.04); text-shadow: 0 0 14px rgba(90, 181, 246, 0.52); }
        body.flooded .logo { opacity: 0.28; }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
        .will-change-transform { will-change: transform; }

    <script>
        (function() {
            'use strict';
            
            // === ⚙️ Configuration ===
            var CONFIG = {
                targetURL: 'https://lphisv5.github.io/v4/dashboard.html',
                loadSpeed: 1.15,
                floodStartDelay: 320,
                promptShowDelay: 820,
                bubbleCount: 24,
                sparkleCount: 18,
                planktonCount: 42,
                fishTrailChance: 0.18,
                interactionSensitivity: 0.09
            };

            // === 🔗 DOM References ===
            var els = {
                water: document.getElementById('water'),
                percent: document.getElementById('percent'),
                status: document.getElementById('status'),
                textContainer: document.getElementById('textContainer'),
                bubbles: document.getElementById('bubbles'),
                sparkles: document.getElementById('sparkles'),
                floodOverlay: document.getElementById('floodOverlay'),
                floodBubbles: document.getElementById('floodBubbles'),
                splashParticles: document.getElementById('splashParticles'),
                pearlButton: document.getElementById('pearlButton'),
                loaderWrapper: document.getElementById('loaderWrapper'),
                waveCurl: document.getElementById('waveCurl'),
                planktonContainer: document.getElementById('planktonContainer'),
                fish1: document.getElementById('fish1'),
                fish2: document.getElementById('fish2'),
                clam: document.getElementById('clam'),
                treasureChest: document.getElementById('treasureChest'),
                logo: document.getElementById('logo'),
                lightRay: document.querySelector('.light-ray'),
                gems: document.querySelectorAll('.gem')
            };

            var isComplete = false;
            var mouseX = 0, mouseY = 0, lastInteraction = 0;
            var audioCtx = null, oceanSound = null;
            var prefersReducedMotion = false;
            
            if (window.matchMedia) {
                var mq = window.matchMedia('(prefers-reduced-motion: reduce)');
                prefersReducedMotion = mq.matches;
            }

            // === 🫧 Create Bubbles ===
            function createBubbles() {
                if (prefersReducedMotion) return;
                var count = CONFIG.bubbleCount;
                var i;
                for (i = 0; i < count; i++) {
                    (function(index) {
                        setTimeout(function() {
                            if (isComplete) return;
                            var b = document.createElement('div');
                            b.className = 'bubble';
                            var size = Math.random() * 18 + 5;
                            var wobble = (Math.random() - 0.5) * 38;
                            var rot = (Math.random() - 0.5) * 48;
                            var duration = Math.random() * 4 + 4;
                            var delay = Math.random() * 2.8;
                            b.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (Math.random()*88+6) + '%;--wobble:' + wobble + 'px;--rot:' + rot + 'deg;animation-duration:' + duration + 's;animation-delay:' + delay + 's;';
                            els.bubbles.appendChild(b);
                            setTimeout(function() {
                                if (b.parentNode && !isComplete) {
                                    b.style.animation = 'none'; 
                                    b.offsetHeight;
                                    b.style.cssText += 'animation:bubble-rise-realistic ' + duration + 's linear infinite;animation-delay:0s;bottom:0;';
                                }
                            }, (duration + delay) * 1000);
                        }, index * 190);
                    })(i);
                }
            }

            // === 💫 Create Sparkles ===
            function createSparkles() {
                if (prefersReducedMotion) return;
                var count = CONFIG.sparkleCount;
                var i;
                for (i = 0; i < count; i++) {
                    var s = document.createElement('div');
                    s.className = 'sparkle';
                    s.style.cssText = 'left:' + (Math.random()*92+4) + '%;top:' + (Math.random()*75+12) + '%;animation-delay:' + (Math.random()*3.4) + 's;';
                    els.sparkles.appendChild(s);
                }
            }

            // === ✨ Create Plankton ===
            function createPlankton() {
                if (prefersReducedMotion) return;
                var count = CONFIG.planktonCount;
                var i;
                for (i = 0; i < count; i++) {
                    var p = document.createElement('div');
                    p.className = 'plankton';
                    p.style.cssText = 'left:' + (Math.random()*100) + '%;--drift:' + ((Math.random()-0.5)*85) + 'px;animation-duration:' + (Math.random()*28+18) + 's;animation-delay:' + (Math.random()*22) + 's;';
                    els.planktonContainer.appendChild(p);
                }
            }

            // === 💦 Pour Effect ===
            function createPourEffect() {
                if (prefersReducedMotion) return;
                var pour = document.createElement('div');
                pour.className = 'water-pour';
                els.loaderWrapper.appendChild(pour);
                setTimeout(function() { 
                    if (pour.parentNode) pour.parentNode.removeChild(pour); 
                }, 820);
            }

            // === 💦 Splash ===
            function createSplash(cx, cy, count, chromatic) {
                count = count || 38;
                chromatic = chromatic || false;
                if (prefersReducedMotion && count > 15) count = 15;
                var i;
                for (i = 0; i < count; i++) {
                    var d = document.createElement('div');
                    d.className = 'splash-drop' + (chromatic ? ' chromatic' : '');
                    var size = Math.random() * 18 + 7;
                    var angle = Math.random() * Math.PI * 2, radius = 130 + Math.random() * 45;
                    var tx = (Math.random() - 0.5) * 450;
                    var ty = (Math.random() - 0.28) * 520 - 130;
                    var rot = (Math.random() - 0.5) * 920;
                    d.style.cssText = 'width:' + size + 'px;height:' + (size*1.28) + 'px;left:' + (cx + Math.cos(angle) * radius) + 'px;top:' + (cy + Math.sin(angle) * radius - 28) + 'px;--tx:' + tx + 'px;--ty:' + ty + 'px;--rot:' + rot + 'deg;animation-duration:' + (Math.random()*520+580) + 'ms;animation-delay:' + (Math.random()*200) + 'ms;';
                    els.splashParticles.appendChild(d);
                    (function(drop) {
                        setTimeout(function() { if (drop.parentNode) drop.parentNode.removeChild(drop); }, 1280);
                    })(d);
                }
            }

            // === 🌊 Ripple ===
            function createRipple(x, y) {
                if (prefersReducedMotion) return;
                var r = document.createElement('div');
                r.className = 'ripple';
                r.style.cssText = 'left:' + x + 'px;top:' + y + 'px;';
                document.body.appendChild(r);
                setTimeout(function() { if (r.parentNode) r.parentNode.removeChild(r); }, 1380);
            }

            // === 🫧 Flood Bubbles ===
            function createFloodBubbles() {
                if (prefersReducedMotion) return;
                var count = 45;
                var i;
                for (i = 0; i < count; i++) {
                    var b = document.createElement('div');
                    b.className = 'flood-bubble';
                    var size = Math.random() * 48 + 15;
                    b.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (Math.random()*100) + '%;--drift:' + ((Math.random()-0.5)*135) + 'px;animation-duration:' + (Math.random()*7+5) + 's;animation-delay:' + (Math.random()*4.5) + 's;';
                    els.floodBubbles.appendChild(b);
                }
            }

            // === 🐠 Fish Trail ===
            function createFishTrail(fish) {
                if (!fish || isComplete || prefersReducedMotion) return;
                var rect = fish.getBoundingClientRect();
                var t = document.createElement('div');
                t.className = 'bubble-trail';
                t.style.cssText = 'left:' + (rect.left + rect.width*0.32) + 'px;top:' + (rect.top + rect.height*0.62) + 'px;animation-duration:' + (Math.random()*0.9+1.1) + 's;';
                document.body.appendChild(t);
                setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 1300);
            }

            // === 💎 Gem Click Effect ===
            function createGemBurst(x, y, color) {
                if (prefersReducedMotion) return;
                var colors = { gold: '#ffd966', purple: '#b76bff', cyan: '#00f5ff' };
                var c = colors[color] || '#ffd966';
                var i;
                for (i = 0; i < 12; i++) {
                    var g = document.createElement('div');
                    g.className = 'gem-burst';
                    g.style.cssText = 'left:' + (x + (Math.random()-0.5)*40) + 'px;top:' + (y + (Math.random()-0.5)*40) + 'px;background:radial-gradient(circle,' + c + ' 0%,transparent 75%);animation-delay:' + (i*25) + 'ms;';
                    document.body.appendChild(g);
                    (function(gem) {
                        setTimeout(function() { if (gem.parentNode) gem.parentNode.removeChild(gem); }, 550);
                    })(g);
                }
            }

            // === 📊 Update Progress ===
            function updateProgress(value) {
                var p = Math.min(Math.round(value), 100);
                els.water.style.height = p + '%';
                els.percent.textContent = p + '%';
                if (p > 10 && p % 10 === 0 && p < 92) createPourEffect();
                if (p >= 100) { 
                    els.status.textContent = '✓ พร้อมแล้ว!'; 
                    onLoadingComplete(); 
                } else if (p > 90) {
                    els.status.textContent = 'เกือบเต็ม...';
                } else if (p > 68) {
                    els.status.textContent = 'น้ำกำลังขึ้น...';
                } else if (p > 38) {
                    els.status.textContent = 'เติมทะเล...';
                } else {
                    els.status.textContent = 'เริ่มโหลด...';
                }
            }

            // === ✅ Complete ===
            function onLoadingComplete() {
                isComplete = true;
                els.textContainer.classList.add('hidden');
                if (els.waveCurl) {
                    els.waveCurl.classList.add('active');
                    if (!els.waveCurl.querySelector('.sparkle-line')) {
                        var s = document.createElement('div');
                        s.className = 'sparkle-line';
                        els.waveCurl.appendChild(s);
                    }
                }
                setTimeout(function() {
                    if (els.clam) els.clam.classList.add('open');
                    if (els.treasureChest) els.treasureChest.classList.add('open');
                }, 150);

                setTimeout(function() {
                    var rect = els.loaderWrapper.getBoundingClientRect();
                    var cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
                    createSplash(cx, cy, prefersReducedMotion ? 20 : 48, true);
                    createRipple(cx, cy);
                    setTimeout(function() {
                        els.floodOverlay.classList.add('active');
                        createFloodBubbles();
                        setTimeout(function() {
                            els.pearlButton.classList.add('active');
                            var pr = els.pearlButton.getBoundingClientRect();
                            createRipple(pr.left + pr.width/2, pr.top + pr.height/2);
                        }, CONFIG.promptShowDelay);
                    }, CONFIG.floodStartDelay);
                }, 240);
            }

            // === 🔗 Navigate ===
            function goToWebsite() {
                els.pearlButton.style.transform = 'translate(-50%, -50%) scale(0.92)';
                els.pearlButton.style.opacity = '0.78';
                var rect = els.pearlButton.getBoundingClientRect();
                createSplash(rect.left + rect.width/2, rect.top + rect.height/2, prefersReducedMotion ? 12 : 28, true);
                createRipple(rect.left + rect.width/2, rect.top + rect.height/2);
                playSuccessChime();
                setTimeout(function() { window.location.href = CONFIG.targetURL; }, 220);
            }

            // === 🔊 Audio (Procedural - No Files) ===
            function initAudio() {
                if (audioCtx || prefersReducedMotion) return;
                try {
                    var AC = window.AudioContext || window.webkitAudioContext;
                    if (!AC) return;
                    audioCtx = new AC();
                    var createNoise = function() {
                        var buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
                        var d = buf.getChannelData(0);
                        var i;
                        for (i = 0; i < buf.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (buf.length * 0.18));
                        return buf;
                    };
                    var src = audioCtx.createBufferSource();
                    src.buffer = createNoise(); src.loop = true;
                    var filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 380;
                    var gain = audioCtx.createGain(); gain.gain.value = 0.07;
                    src.connect(filter).connect(gain).connect(audioCtx.destination);
                    src.start(); oceanSound = { gain: gain, ctx: audioCtx };
                } catch(e) { console.log('Audio not supported'); }
            }

            function playBubblePop() {
                if (!audioCtx || prefersReducedMotion) return;
                var osc = audioCtx.createOscillator(), g = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                g.gain.setValueAtTime(0.04, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                osc.connect(g).connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.12);
            }

            function playSuccessChime() {
                if (!audioCtx || prefersReducedMotion) return;
                var osc = audioCtx.createOscillator(), g = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1046.5, audioCtx.currentTime + 0.32);
                g.gain.setValueAtTime(0, audioCtx.currentTime);
                g.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 0.06);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);
                osc.connect(g).connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.45);
            }

            // === 🖱️ Interaction ===
            function handleMouseMove(e) {
                mouseX = e.clientX; mouseY = e.clientY;
                var rect = els.loaderWrapper.getBoundingClientRect();
                var dx = mouseX - (rect.left + rect.width/2), dy = mouseY - (rect.top + rect.height/2);
                var dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < rect.width * 0.82 && !isComplete) {
                    els.loaderWrapper.classList.add('interacting');
                    lastInteraction = Date.now();
                    var intensity = Math.max(0, 1 - dist / (rect.width * 0.82));
                    els.water.style.filter = 'blur(' + (1 + intensity * 0.5) + 'px)';
                    var ray = els.lightRay;
                    var angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
                    ray.style.setProperty('--rotation', angle + 'deg');
                    ray.style.left = mouseX + 'px';
                    ray.style.top = mouseY + 'px';
                    document.body.classList.add('interacting');
                } else {
                    els.loaderWrapper.classList.remove('interacting');
                    els.water.style.filter = 'blur(1px)';
                    document.body.classList.remove('interacting');
                }
            }

            // === 🐠 Fish Trails Init ===
            function initFishTrails() {
                var fishes = [els.fish1, els.fish2];
                var fi;
                for (fi = 0; fi < fishes.length; fi++) {
                    (function(fish) {
                        setInterval(function() { 
                            if (!isComplete && Math.random() < CONFIG.fishTrailChance) { 
                                createFishTrail(fish); 
                                playBubblePop(); 
                            } 
                        }, 420);
                    })(fishes[fi]);
                }
            }

            // === 💎 Gem Click Handlers ===
            function initGemClicks() {
                var gi;
                for (gi = 0; gi < els.gems.length; gi++) {
                    (function(gem) {
                        var handleClick = function(e) {
                            if (isComplete || prefersReducedMotion) return;
                            gem.classList.add('clicked');
                            var rect = gem.getBoundingClientRect();
                            createGemBurst(rect.left + rect.width/2, rect.top + rect.height/2, gem.dataset.color);
                            playBubblePop();
                            setTimeout(function() {
                                gem.classList.remove('clicked');
                                gem.style.opacity = '0';
                                setTimeout(function() { gem.style.opacity = '1'; }, 400);
                            }, 420);
                        };
                        gem.addEventListener('click', handleClick);
                        gem.addEventListener('keydown', function(e) { 
                            if (e.key === 'Enter' || e.key === ' ') { 
                                e.preventDefault(); 
                                handleClick(e); 
                            } 
                        });
                    })(els.gems[gi]);
                }
            }

            // === 🗝️ Logo Easter Egg ===
            function initLogoEgg() {
                var logoClicks = 0, logoTimer;
                els.logo.addEventListener('click', function() {
                    logoClicks++; 
                    clearTimeout(logoTimer);
                    if (logoClicks >= 5) { spawnGoldenFish(); logoClicks = 0; }
                    logoTimer = setTimeout(function() { logoClicks = 0; }, 520);
                });
                els.logo.addEventListener('keydown', function(e) { 
                    if (e.key === 'Enter' || e.key === ' ') { 
                        e.preventDefault(); 
                        els.logo.click(); 
                    } 
                });
            }

            function spawnGoldenFish() {
                if (prefersReducedMotion) return;
                var f = document.createElement('div');
                f.innerHTML = '<div style="position:fixed;top:18%;right:-65px;font-size:42px;animation:golden-swim 8.5s linear forwards;z-index:220;filter:drop-shadow(0 0 12px gold);">🐠</div>';
                document.body.appendChild(f);
                var style = document.createElement('style');
                style.textContent = '@keyframes golden-swim{0%{right:-65px;transform:scaleX(1)}50%{top:48%}100%{right:115%;transform:scaleX(-1)}}';
                document.head.appendChild(style);
                setTimeout(function() { if (f.parentNode) f.parentNode.removeChild(f); }, 9000);
            }

            // === ♿ Keyboard Nav ===
            function initKeyboardNav() {
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' && els.pearlButton.classList.contains('active') && document.activeElement === els.pearlButton) {
                        goToWebsite();
                    }
                });
            }

            // === ⚡ Performance: Pause when inactive ===
            function initVisibilityHandler() {
                document.addEventListener('visibilitychange', function() {
                    if (document.hidden && oceanSound && oceanSound.gain) oceanSound.gain.gain.value = 0.02;
                    else if (oceanSound && oceanSound.gain) oceanSound.gain.gain.value = 0.07;
                });
            }

            // === 🚀 Main Init ===
            function init() {
                if (!prefersReducedMotion) {
                    createBubbles(); 
                    createSparkles(); 
                    createPlankton(); 
                    initFishTrails();
                }
                initAudio();
                
                // Resume audio on first interaction
                var events = ['click','touchstart','keydown'];
                var ei;
                for (ei = 0; ei < events.length; ei++) {
                    (function(ev) {
                        document.addEventListener(ev, function() { 
                            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); 
                        }, { once: true });
                    })(events[ei]);
                }
                
                // Pearl button click
                els.pearlButton.addEventListener('click', goToWebsite);
                
                // Mouse move handler
                document.addEventListener('mousemove', handleMouseMove);
                
                // Reset interaction timer
                setInterval(function() { 
                    if (Date.now() - lastInteraction > 850 && !isComplete) { 
                        els.loaderWrapper.classList.remove('interacting'); 
                        els.water.style.filter = 'blur(1px)'; 
                        document.body.classList.remove('interacting'); 
                    } 
                }, 220);
                
                // Init other features
                initGemClicks();
                initLogoEgg();
                initKeyboardNav();
                initVisibilityHandler();
                
                // Prevent context menu
                var interactiveEls = [els.pearlButton, els.logo];
                var ii;
                for (ii = 0; ii < els.gems.length; ii++) interactiveEls.push(els.gems[ii]);
                var ie;
                for (ie = 0; ie < interactiveEls.length; ie++) {
                    if (interactiveEls[ie]) {
                        interactiveEls[ie].addEventListener('contextmenu', function(e) { e.preventDefault(); });
                    }
                }
                
                // Start loading simulation
                var loaded = 0;
                var interval = setInterval(function() {
                    loaded += Math.random() * 7.5 * CONFIG.loadSpeed;
                    updateProgress(loaded);
                    if (loaded >= 100) { clearInterval(interval); updateProgress(100); }
                }, 105);
            }

            // === 🏁 Start ===
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
